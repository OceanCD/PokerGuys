                        <div class="mini-stat"><div class="label">Small Table (≤6)</div><div class="value ${smallAvg !== null ? (smallAvg >= 0 ? 'positive' : 'negative') : ''}">${smallAvg !== null ? (smallAvg >= 0 ? '+' : '') + smallAvg.toLocaleString() : 'N/A'}</div><div style="font-size:10px;color:var(--text-dim);">${smallCount} sessions</div></div>
                        <div class="mini-stat"><div class="label">Large Table (>6)</div><div class="value ${largeAvg !== null ? (largeAvg >= 0 ? 'positive' : 'negative') : ''}">${largeAvg !== null ? (largeAvg >= 0 ? '+' : '') + largeAvg.toLocaleString() : 'N/A'}</div><div style="font-size:10px;color:var(--text-dim);">${largeCount} sessions</div></div>
                    </div>
                </div>`;

            // Show detailed stats
            let statsHtml = `<div class="player-stats-grid">
                <div class="mini-stat"><div class="label">Win Rate</div><div class="value ${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div></div>
                <div class="mini-stat"><div class="label">Wins</div><div class="value positive">${wins}</div></div>
                <div class="mini-stat"><div class="label">Losses</div><div class="value negative">${losses}</div></div>
                <div class="mini-stat"><div class="label">Best Streak</div><div class="value">${maxWinStreak}</div></div>
                <div class="mini-stat"><div class="label">Worst Streak</div><div class="value negative">${maxLossStreak}</div></div>
                <div class="mini-stat"><div class="label">ROI %</div><div class="value ${roi >= 0 ? 'positive' : 'negative'}">${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%</div></div>
                <div class="mini-stat"><div class="label">Avg P&amp;L/Session</div><div class="value ${avgPnl >= 0 ? 'positive' : 'negative'}">${avgPnl >= 0 ? '+' : ''}${Math.round(avgPnl).toLocaleString()}</div></div>
                <div class="mini-stat"><div class="label">Avg Buy-in</div><div class="value">${Math.round(avgBuyIn).toLocaleString()}</div></div>
                <div class="mini-stat"><div class="label">Current Streak</div><div class="value">${streakIndicator || '<span style="color:var(--text-dim)">—</span>'}</div></div>
            </div>
            ${sizeImpactHtml}`;

            let html = '<div class="player-detail-header" style="margin-bottom:10px;font-size:12px;color:var(--text-dim);display:grid;grid-template-columns:2fr 1fr 1fr 1fr;"><div>Date</div><div>Buy-in</div><div>Stack</div><div>Net</div></div>';
            playerSessions.forEach(s => {
                const pnlClass = s.pnl >= 0 ? 'positive' : 'negative';
                const pnlPrefix = s.pnl >= 0 ? '+' : '';
                html += `<div class="player-detail-row"><div class="date">${s.date}</div><div>${Math.round(s.buyIn).toLocaleString()}</div><div>${Math.round(s.final).toLocaleString()}</div><div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(s.pnl).toLocaleString()}</div></div>`;
            });

            document.getElementById('playerSessionsList').innerHTML = statsHtml + (html || '<div class="empty">No sessions</div>');
            document.getElementById('playerModal').classList.add('active');
        }
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageName).classList.add('active');
            event.target.classList.add('active');
            if (pageName === 'history') renderHistory();
            if (pageName === 'stats') renderStats();
        }
        
        renderPlayers(); renderHistory();
        newPlayerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });
        
        // Initialize community selector
        renderCommunitySelector();
        renderLoginPage();
        
        function renderLoginPage() {
            const loginDiv = document.getElementById('loginContent');
            
            if (!currentCommunity) {
                // Show login form
                loginDiv.innerHTML = `
                    <div class="login-container">
                        <div class="login-header">
                            <h2>🃏 PokerGuys</h2>
                            <p>Join or create a poker community</p>
                        </div>
                        
                        <div class="login-form">
                            <input type="text" id="loginName" placeholder="Your Name" value="${localStorage.getItem('pokerUserName') || ''}">
                            <input type="text" id="newCommunityNameInput" placeholder="Community Name (for new community)">
                            <input type="text" id="loginCode" placeholder="Community Code (6 chars)" maxlength="6" style="text-transform: uppercase;">
                            <button class="btn-login" onclick="loginWithCommunity()">🚀 Join Community</button>
                        </div>
                        
                        <div style="text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 20px;">
                            <p>Don't have a code?</p>
                            <p>Enter any 6-character code to create a new community!</p>
                        </div>
                        
                        <div class="import-section">
                            <h3>📸 Import from Screenshot</h3>
                            <span class="developing-badge">🛠️ In Progress - Coming Soon</span>
                            <input type="file" id="screenshotInput" accept="image/*" onchange="handleScreenshotUpload()" disabled>
                            <img id="importPreview" class="import-preview" alt="Preview">
                            <div id="importStatus" class="import-status"></div>
                            <button class="btn-community" onclick="analyzeScreenshot()" id="analyzeBtn" disabled>🔍 Analyze & Import</button>
                        </div>
                    </div>
                `;
            } else {
                // Show community info
                loginDiv.innerHTML = `
                    <div class="login-container">
                        <div class="login-header">
                            <h2>👤 ${currentUser?.name || 'Player'}</h2>
                            <p>Connected to cloud</p>
                        </div>
                        
                        <div class="community-info">
                            <div style="font-size: 12px; color: var(--text-dim);">Community Code</div>
                            <div class="code">${currentCommunity.code}</div>
                            <div style="font-size: 14px; font-weight: bold; color: var(--gold);">${currentCommunity.name}</div>
                            <div class="members">${sessions.length} sessions synced</div>
                        </div>
                        
                        <button class="btn-community secondary" onclick="logout()" style="width: 100%;">🚪 Leave Community</button>
                        
                        <div style="margin-top: 30px; padding: 15px; background: var(--card); border-radius: 8px; font-size: 12px; color: var(--text-dim);">
                            <strong>💡 Share this code with friends:</strong><br>
                            <span style="font-size: 24px; color: var(--gold); font-weight: bold;">${currentCommunity.code}</span><br>
                            They can join by entering this code and their name!
                        </div>
                        
                        <div class="import-section">
                            <h3>📸 Import from Screenshot</h3>
                            <span class="developing-badge">🛠️ In Progress - Coming Soon</span>
                            <input type="file" id="screenshotInput" accept="image/*" onchange="handleScreenshotUpload()" disabled>
                            <img id="importPreview" class="import-preview" alt="Preview">
                            <div id="importStatus" class="import-status"></div>
                            <button class="btn-community" onclick="analyzeScreenshot()" id="analyzeBtn" disabled>🔍 Analyze & Import</button>
                        </div>
                    </div>
                `;
            }
        }
        
        function doCreateCommunity() {
            const name = document.getElementById('newCommunityName').value;
            createCommunity(name);
        }
        
        let uploadedImageBase64 = null;
        
        function handleScreenshotUpload() {
            const input = document.getElementById('screenshotInput');
            const preview = document.getElementById('importPreview');
            const file = input.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImageBase64 = e.target.result;
                    preview.src = uploadedImageBase64;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }
        
        function analyzeScreenshot() {
            const status = document.getElementById('importStatus');
            const btn = document.getElementById('analyzeBtn');
            
            if (!uploadedImageBase64) {
                alert('Please upload a screenshot first');
                return;
            }
            
            status.className = 'import-status loading';
            status.textContent = '🔄 Analyzing screenshot... (This feature requires backend AI. For now, please use manual entry.)';
            btn.disabled = true;
            
            // For now, show a message about the AI feature
            // In production, this would call an AI API endpoint
            setTimeout(() => {
                status.className = 'import-status error';
                status.innerHTML = '⚠️ AI Analysis requires backend setup.<br><br>For now, please manually enter the session data below:';
                
                // Show manual entry form
                showManualEntryForm();
                
                btn.disabled = false;
            }, 2000);
        }
        
        function showManualEntryForm() {
            const status = document.getElementById('importStatus');
            const existingForm = document.getElementById('manualEntryForm');
            if (existingForm) existingForm.remove();
            
            const formHtml = `
                <div id="manualEntryForm" style="margin-top: 15px; padding: 15px; background: var(--bg); border-radius: 8px;">
                    <h4 style="color: var(--gold); margin-bottom: 10px;">Manual Entry</h4>
                    <input type="date" id="sessionDate" style="width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 10px;">
                    <textarea id="manualPlayersData" style="width: 100%; height: 100px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; font-size: 12px; margin-bottom: 10px;" placeholder="Paste player data (one per line):&#10;PlayerName, buyIn, stack&#10;Example:&#10;Johnny Ye, 6000, 5300&#10;Teng, 4000, 4360"></textarea>
                    <button class="btn-community" onclick="importManualData()">Import Data</button>
                </div>
            `;
            status.insertAdjacentHTML('beforeend', formHtml);
        }
        
        function importManualData() {
            const date = document.getElementById('sessionDate').value;
            const dataText = document.getElementById('manualPlayersData').value;
            
            if (!date) { alert('Please enter a date'); return; }
            if (!dataText.trim()) { alert('Please enter player data'); return; }
            
            try {
                const players = [];
                const lines = dataText.split('\n');
                
                lines.forEach(line => {
                    const parts = line.split(',').map(s => s.trim());
                    if (parts.length >= 3) {
                        const name = parts[0];
                        const buyIn = parseFloat(parts[1]) || 0;
                        const stack = parseFloat(parts[2]) || 0;
                        if (name && (buyIn > 0 || stack > 0)) {
                            players.push({ name, buyIn, stack, hands: 1 });
                        }
                    }
                });
                
                if (players.length === 0) { alert('No valid player data found'); return; }
                
                // Calculate totals
                let totalUp = 0, totalDown = 0;
                players.forEach(p => {
                    const pnl = p.stack - p.buyIn;
                    if (pnl >= 0) totalUp += pnl;
                    else totalDown += pnl;
                });
                
                const communitySessions = getCommunitySessions();
                const session = {
                    id: Date.now(),
                    date: date,
                    players: players,
                    totalUp,
                    totalDown,
                    net: totalUp + totalDown,
                    communityId: currentCommunityId
                };
                
                communitySessions.unshift(session);
                saveCommunitySessions(communitySessions);
                
                const status = document.getElementById('importStatus');
                status.className = 'import-status success';
                status.textContent = `✅ Successfully imported session with ${players.length} players!`;
                
                // Reset form
                document.getElementById('screenshotInput').value = '';
                document.getElementById('importPreview').style.display = 'none';
                uploadedImageBase64 = null;
                
                renderHistory();
                renderStats();
                
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageName).classList.add('active');
            event.target.classList.add('active');
            if (pageName === 'history') renderHistory();
            if (pageName === 'stats') renderStats();
            if (pageName === 'login') renderLoginPage();
        }
    </script>
    
    <div class="footer">
        © 2026 PokerGuys. All rights reserved.
    </div>
</body>
</html>
