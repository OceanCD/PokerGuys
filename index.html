<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokerGuys - Texas Hold'em Session Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --border: #2a2e39;
            --gold: #f0b90b;
            --profit: #f6465d;
            --loss: #0b8a4e;
            --text: #eaecef;
            --text-dim: #848e9c;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }
        
        .header h1 {
            font-size: 28px;
            color: var(--gold);
            margin-bottom: 5px;
        }
        
        .header p {
            color: var(--text-dim);
            font-size: 12px;
        }
        
        /* Input Section */
        .input-section {
            padding: 15px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .input-group {
            flex: 1;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        
        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .btn-add {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Player Table */
        .table-header {
            display: grid;
            grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr;
            padding: 12px 15px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
        }
        
        .player-row {
            display: grid;
            grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr;
            padding: 10px 15px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }
        
        .player-row:nth-child(even) {
            background: rgba(30, 35, 41, 0.5);
        }
        
        /* Name input */
        .name-input {
            background: transparent !important;
            border: none !important;
            padding: 5px !important;
            font-size: 14px !important;
            color: var(--text) !important;
        }
        
        /* Hands controls */
        .hands-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-hands {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gold);
            color: #000;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        
        .hands-num {
            font-weight: bold;
            min-width: 25px;
            text-align: center;
        }
        
        /* Stack input */
        .stack-input {
            background: transparent !important;
            border: none !important;
            padding: 5px !important;
            text-align: right;
            font-size: 14px !important;
            color: var(--gold) !important;
        }
        
        /* P&L */
        .pnl {
            text-align: right;
            font-weight: bold;
            font-size: 14px;
        }
        
        .pnl.positive { color: var(--profit); }
        .pnl.negative { color: var(--loss); }
        
        /* Delete button */
        .btn-delete {
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
        }
        
        /* Totals */
        .totals {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 15px;
            background: var(--card);
            border-top: 2px solid var(--gold);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        
        .total-item {
            text-align: center;
        }
        
        .total-item .label {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 3px;
        }
        
        .total-item .value {
            font-size: 16px;
            font-weight: bold;
        }
        
        .total-item.up .value { color: var(--profit); }
        .total-item.down .value { color: var(--loss); }
        
        .balance-ok {
            color: var(--loss) !important;
        }
        
        .balance-error {
            color: var(--profit) !important;
        }
        
        /* Save button */
        .save-section {
            padding: 15px;
            padding-bottom: 90px;
        }
        
        .btn-save {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-save:disabled {
            background: var(--border);
            color: var(--text-dim);
        }
        
        .confirm-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            background: var(--card);
            border-radius: 8px;
        }
        
        .confirm-check input {
            width: 20px;
            height: 20px;
        }
        
        /* Navigation */
        .nav {
            display: flex;
            background: var(--card);
            border-top: 1px solid var(--border);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .nav-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            border: none;
            background: transparent;
        }
        
        .nav-item.active {
            color: var(--gold);
        }
        
        /* Page sections */
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        /* History */
        .history-item {
            padding: 15px;
            background: var(--card);
            border-radius: 8px;
            margin: 10px 15px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .history-date {
            font-weight: bold;
            color: var(--gold);
        }
        
        .history-location {
            color: var(--text-dim);
            font-size: 12px;
        }
        
        .history-players {
            font-size: 13px;
        }
        
        .history-pnl {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
        }
        
        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        @media (min-width: 768px) {
            .container {
                max-width: 600px;
                margin: 0 auto;
            }
            
            .table-header,
            .player-row {
                grid-template-columns: 2fr 2fr 2fr 2fr 0.5fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🃏 PokerGuys</h1>
            <p>Texas Hold'em Session Tracker</p>
        </div>
        
        <!-- New Session Page -->
        <div id="page-session" class="page active">
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-row">
                    <div class="input-group">
                        <label>Buy-in Amount</label>
                        <input type="number" id="buyInAmount" value="1000" step="100">
                    </div>
                    <div class="input-group">
                        <label>New Player</label>
                        <input type="text" id="newPlayerName" placeholder="Nickname...">
                    </div>
                </div>
                <button class="btn-add" onclick="addPlayer()">➕ Add Player</button>
            </div>
            
            <!-- Table Header -->
            <div class="table-header">
                <div>Name</div>
                <div style="text-align:center">Hands</div>
                <div style="text-align:right">Stack</div>
                <div style="text-align:right">P&L</div>
                <div></div>
            </div>
            
            <!-- Players List -->
            <div id="playersList"></div>
            
            <!-- Save Section -->
            <div class="save-section">
                <div class="confirm-check">
                    <input type="checkbox" id="confirmSave">
                    <label for="confirmSave">I confirm to save (will clear current inputs)</label>
                </div>
                <button class="btn-save" id="saveBtn" onclick="saveSession()" disabled>💾 Save Session</button>
            </div>
        </div>
        
        <!-- History Page -->
        <div id="page-history" class="page">
            <div id="historyList"></div>
        </div>
        
        <!-- Statistics Page -->
        <div id="page-stats" class="page">
            <div class="empty">Statistics coming soon</div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="nav">
        <button class="nav-item active" onclick="showPage('session')">🃏 Session</button>
        <button class="nav-item" onclick="showPage('history')">📜 History</button>
        <button class="nav-item" onclick="showPage('stats')">📊 Stats</button>
    </nav>
    
    <script>
        // State
        let players = [];
        let sessions = JSON.parse(localStorage.getItem('pokerSessions') || '[]');
        
        // DOM Elements
        const buyInInput = document.getElementById('buyInAmount');
        const newPlayerInput = document.getElementById('newPlayerName');
        const playersList = document.getElementById('playersList');
        const confirmCheck = document.getElementById('confirmSave');
        const saveBtn = document.getElementById('saveBtn');
        
        // Update save button state
        confirmCheck.addEventListener('change', () => {
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        });
        
        // Add player
        function addPlayer() {
            const name = newPlayerInput.value.trim();
            const buyIn = parseFloat(buyInInput.value) || 1000;
            
            if (!name) {
                alert('Please enter a player name');
                return;
            }
            
            players.push({
                name: name,
                hands: 1,
                buyIn: buyIn,
                stack: buyIn
            });
            
            newPlayerInput.value = '';
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        // Remove player
        function removePlayer(index) {
            players.splice(index, 1);
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        // Change hands
        function changeHands(index, delta) {
            players[index].hands += delta;
            if (players[index].hands < 1) players[index].hands = 1;
            players[index].buyIn = players[index].hands * parseFloat(buyInInput.value);
            players[index].stack = players[index].buyIn;
            renderPlayers();
        }
        
        // Update stack
        function updateStack(index, value) {
            players[index].stack = parseFloat(value) || 0;
            renderPlayers();
        }
        
        // Update name
        function updateName(index, value) {
            players[index].name = value;
        }
        
        // Calculate totals
        function calculateTotals() {
            let totalUp = 0;
            let totalDown = 0;
            
            players.forEach(p => {
                const pnl = p.stack - p.buyIn;
                if (pnl >= 0) totalUp += pnl;
                else totalDown += pnl;
            });
            
            return { totalUp, totalDown, balance: totalUp + totalDown };
        }
        
        // Render players
        function renderPlayers() {
            if (players.length === 0) {
                playersList.innerHTML = '<div class="empty">No players yet. Add players above.</div>';
                renderTotals(0, 0, 0);
                return;
            }
            
            const { totalUp, totalDown, balance } = calculateTotals();
            
            let html = '';
            players.forEach((p, i) => {
                const pnl = p.stack - p.buyIn;
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                const pnlPrefix = pnl >= 0 ? '+' : '';
                
                html += `
                <div class="player-row">
                    <div>
                        <input type="text" class="name-input" value="${p.name}" 
                            onchange="updateName(${i}, this.value)">
                    </div>
                    <div class="hands-control">
                        <button class="btn-hands" onclick="changeHands(${i}, -1)">−</button>
                        <span class="hands-num">${p.hands}</span>
                        <button class="btn-hands" onclick="changeHands(${i}, 1)">+</button>
                    </div>
                    <div>
                        <input type="number" class="stack-input" value="${p.stack}" 
                            onchange="updateStack(${i}, this.value)">
                    </div>
                    <div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(pnl).toLocaleString()}</div>
                    <button class="btn-delete" onclick="removePlayer(${i})">🗑️</button>
                </div>
                `;
            });
            
            playersList.innerHTML = html;
            renderTotals(totalUp, totalDown, balance);
        }
        
        // Render totals
        function renderTotals(totalUp, totalDown, balance) {
            const totalsDiv = document.getElementById('totals');
            if (!totalsDiv) {
                // Create totals if not exists
                const totalsHTML = `
                <div class="totals" id="totals">
                    <div class="total-item up">
                        <div class="label">Total Up</div>
                        <div class="value">${Math.round(totalUp).toLocaleString()}</div>
                    </div>
                    <div class="total-item down">
                        <div class="label">Total Down</div>
                        <div class="value">${Math.round(totalDown).toLocaleString()}</div>
                    </div>
                    <div class="total-item">
                        <div class="label">Balance</div>
                        <div class="value ${Math.abs(balance) < 1 ? 'balance-ok' : 'balance-error'}">
                            ${Math.abs(balance) < 1 ? '✅ Balanced' : '❌ ' + Math.round(balance).toLocaleString()}
                        </div>
                    </div>
                </div>
                `;
                document.body.insertAdjacentHTML('beforeend', totalsHTML);
            } else {
                totalsDiv.innerHTML = `
                    <div class="total-item up">
                        <div class="label">Total Up</div>
                        <div class="value">${Math.round(totalUp).toLocaleString()}</div>
                    </div>
                    <div class="total-item down">
                        <div class="label">Total Down</div>
                        <div class="value">${Math.round(totalDown).toLocaleString()}</div>
                    </div>
                    <div class="total-item">
                        <div class="label">Balance</div>
                        <div class="value ${Math.abs(balance) < 1 ? 'balance-ok' : 'balance-error'}">
                            ${Math.abs(balance) < 1 ? '✅ Balanced' : '❌ ' + Math.round(balance).toLocaleString()}
                        </div>
                    </div>
                `;
            }
        }
        
        // Save session
        function saveSession() {
            const { totalUp, totalDown, balance } = calculateTotals();
            
            if (Math.abs(balance) >= 1) {
                alert(`Cannot save: Table imbalance of ${Math.round(balance)} chips!`);
                return;
            }
            
            const session = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                players: JSON.parse(JSON.stringify(players)),
                totalUp,
                totalDown
            };
            
            sessions.unshift(session);
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
            
            // Reset
            players = [];
            confirmCheck.checked = false;
            saveBtn.disabled = true;
            
            renderPlayers();
            renderHistory();
            alert('Session saved!');
        }
        
        // Render history
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            if (sessions.length === 0) {
                historyList.innerHTML = '<div class="empty">No sessions recorded yet.</div>';
                return;
            }
            
            let html = '';
            sessions.forEach(session => {
                const totalBuyIn = session.players.reduce((sum, p) => sum + p.buyIn, 0);
                const totalFinal = session.players.reduce((sum, p) => sum + p.stack, 0);
                
                html += `
                <div class="history-item">
                    <div class="history-header">
                        <div>
                            <div class="history-date">${session.date}</div>
                            <div class="history-location">${session.players.length} players</div>
                        </div>
                        <div class="history-pnl">
                            <div class="label">Net</div>
                            <div class="${session.totalUp + session.totalDown >= 0 ? 'positive' : 'negative'}" style="font-weight:bold;">
                                ${session.totalUp + session.totalDown >= 0 ? '+' : ''}${Math.round(session.totalUp + session.totalDown).toLocaleString()}
                            </div>
                        </div>
                    </div>
                    <div class="history-players">
                        ${session.players.map(p => `${p.name}: ${Math.round(p.stack - p.buyIn) >= 0 ? '+' : ''}${Math.round(p.stack - p.buyIn)}`).join(' | ')}
                    </div>
                </div>
                `;
            });
            
            historyList.innerHTML = html;
        }
        
        // Show page
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('page-' + pageName).classList.add('active');
            event.target.classList.add('active');
            
            if (pageName === 'history') {
                renderHistory();
            }
        }
        
        // Initialize
        renderPlayers();
        renderHistory();
        
        // Handle Enter key on new player input
        newPlayerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addPlayer();
        });
    </script>
</body>
</html>
