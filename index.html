<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokerGuys - Texas Hold'em Session Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        :root { --bg: #0b0e11; --card: #1e2329; --border: #2a2e39; --gold: #f0b90b; --profit: #f6465d; --loss: #0b8a4e; --text: #eaecef; --text-dim: #848e9c; }
        
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 70px; }
        
        .header { text-align: center; padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        .header h1 { font-size: 24px; color: var(--gold); margin-bottom: 5px; }
        .header p { color: var(--text-dim); font-size: 12px; }
        .community-selector { margin-top: 10px; padding: 8px 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
        .community-selector select { background: transparent; border: none; color: var(--text); font-size: 13px; cursor: pointer; outline: none; }
        .community-selector::after { content: '▼'; font-size: 8px; color: var(--text-dim); }
        
        .input-section { padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        
        input[type="number"], input[type="text"], input[type="date"] { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; }
        input:focus { outline: none; border-color: var(--gold); }
        
        .btn-add { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .table-header { display: grid; grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr; padding: 12px 15px; background: var(--card); font-size: 12px; font-weight: 600; color: var(--gold); }
        
        .player-row { display: grid; grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr; padding: 10px 15px; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); }
        .player-row:nth-child(even) { background: rgba(30, 35, 41, 0.5); }
        
        .name-input { background: transparent !important; border: none !important; padding: 5px !important; font-size: 14px !important; color: var(--text) !important; width: 100%; }
        
        .hands-control { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-hands { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: #000; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .hands-num { font-weight: bold; min-width: 25px; text-align: center; }
        
        .stack-input { background: transparent !important; border: none !important; padding: 5px !important; text-align: right; font-size: 14px !important; color: var(--gold) !important; width: 100%; }
        
        .pnl { text-align: right; font-weight: bold; font-size: 14px; }
        .pnl.positive { color: var(--profit); }
        .pnl.negative { color: var(--loss); }
        
        .btn-delete { background: transparent; border: none; font-size: 18px; cursor: pointer; padding: 5px; }
        
        .net-status { padding: 15px; margin: 10px 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 16px; }
        .net-status.even { background: rgba(11, 138, 78, 0.2); color: var(--loss); border: 1px solid var(--loss); }
        .net-status.win { background: rgba(246, 70, 93, 0.2); color: var(--profit); border: 1px solid var(--profit); }
        .net-status.loss { background: rgba(11, 138, 78, 0.2); color: var(--loss); border: 1px solid var(--loss); }
        
        .totals { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; background: var(--card); border-top: 2px solid var(--gold); position: fixed; bottom: 0; left: 0; right: 0; }
        .total-item { text-align: center; }
        .total-item .label { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
        .total-item .value { font-size: 16px; font-weight: bold; }
        
        .save-section { padding: 15px; padding-bottom: 90px; }
        .btn-save { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-save:disabled { background: var(--border); color: var(--text-dim); }
        
        .confirm-check { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 10px; background: var(--card); border-radius: 8px; }
        .confirm-check input { width: 20px; height: 20px; }
        
        .nav { display: flex; background: var(--card); border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
        .nav-item { flex: 1; padding: 12px; text-align: center; color: var(--text-dim); font-size: 12px; cursor: pointer; border: none; background: transparent; }
        .nav-item.active { color: var(--gold); }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .history-item { padding: 15px; background: var(--card); border-radius: 8px; margin: 10px 15px; cursor: pointer; }
        .history-header { display: flex; justify-content: space-between; align-items: center; }
        .history-date { font-weight: bold; color: var(--gold); }
        .history-location { color: var(--text-dim); font-size: 12px; }
        .history-winner { text-align: right; }
        .history-winner .label { font-size: 10px; color: var(--text-dim); }
        .history-winner .name { font-weight: bold; color: var(--profit); font-size: 14px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: var(--bg); max-width: 600px; margin: 20px auto; border-radius: 12px; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .modal-header h2 { color: var(--gold); font-size: 18px; }
        .modal-close { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--text-dim); }
        
        .modal-input { margin-bottom: 15px; }
        .modal-input label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        
        .player-edit-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr; gap: 5px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .player-edit-row input { padding: 8px; font-size: 13px; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-save-changes { flex: 1; padding: 12px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-delete-session { flex: 1; padding: 12px; background: transparent; color: var(--profit); border: 1px solid var(--profit); border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card.full { grid-column: span 2; }
        .stat-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
        .stat-card .value { font-size: 18px; font-weight: bold; color: var(--gold); }
        .stat-card .value.positive { color: var(--profit); }
        .stat-card .value.negative { color: var(--loss); }
        
        .chart-container { padding: 15px; background: var(--card); margin: 10px 15px; border-radius: 8px; }
        .chart-title { color: var(--gold); margin-bottom: 10px; font-size: 14px; }
        .chart-filter { margin-bottom: 10px; }
        .chart-filter select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
        
        .line-chart { width: 100%; height: 180px; position: relative; padding-top: 20px; }
        .line-chart svg { width: 100%; height: 100%; }
        
        .player-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .mini-stat { background: var(--card); padding: 10px; border-radius: 6px; text-align: center; }
        .mini-stat .label { font-size: 10px; color: var(--text-dim); }
        .mini-stat .value { font-size: 14px; font-weight: bold; color: var(--gold); }
        
        .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 150px; padding-top: 20px; }
        .bar { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .bar-value { font-size: 10px; margin-bottom: 5px; color: var(--text-dim); }
        .bar-fill { width: 100%; border-radius: 4px 4px 0 0; }
        .bar-fill.positive { background: var(--profit); }
        .bar-fill.negative { background: var(--loss); }
        .bar-label { font-size: 10px; color: var(--text-dim); margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50px; }
        
        .player-stats { padding: 15px; }
        .player-stats h3 { color: var(--gold); margin-bottom: 10px; font-size: 16px; }
        
        .player-stat-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
        .player-stat-row:hover { background: var(--card); }
        .player-stat-row.header { cursor: default; }
        .player-stat-row.header:hover { background: transparent; }
        
        .player-detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .player-detail-row .date { color: var(--gold); font-weight: bold; }
        .player-detail-row .pnl { font-weight: bold; }
        
        .empty { text-align: center; padding: 40px; color: var(--text-dim); }
        
        .login-container { padding: 20px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { color: var(--gold); font-size: 24px; margin-bottom: 10px; }
        .login-header p { color: var(--text-dim); font-size: 14px; }
        
        .community-list { margin-top: 20px; }
        .community-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 8px; margin-bottom: 10px; }
        .community-item .name { font-weight: bold; }
        .community-item .sessions { font-size: 12px; color: var(--text-dim); }
        .community-item.active { border: 2px solid var(--gold); }
        
        .btn-community { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-community.secondary { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        
        .create-community-form { background: var(--card); padding: 20px; border-radius: 8px; margin-top: 20px; }
        .create-community-form h3 { color: var(--gold); margin-bottom: 15px; }
        .create-community-form input { margin-bottom: 15px; }
        
        @media (min-width: 768px) { .container { max-width: 600px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🃏 PokerGuys</h1>
            <p>Texas Hold'em Session Tracker</p>
            <div class="community-selector" id="communitySelector">
                <span>🏠</span>
                <select id="communitySelect" onchange="switchCommunity(this.value)">
                    <option value="default">My Community</option>
                </select>
            </div>
        </div>
        
        <div id="page-session" class="page active">
            <div class="input-section">
                <div class="input-row">
                    <div class="input-group">
                        <label>Buy-in Amount</label>
                        <input type="number" id="buyInAmount" value="1000" step="100" onchange="updateAllStacks()">
                    </div>
                    <div class="input-group">
                        <label>New Player</label>
                        <input type="text" id="newPlayerName" placeholder="Nickname...">
                    </div>
                </div>
                <button class="btn-add" onclick="addPlayer()">➕ Add Player</button>
            </div>
            
            <div class="table-header">
                <div>Name</div>
                <div style="text-align:center">Buy-in</div>
                <div style="text-align:right">Stack</div>
                <div style="text-align:right">P&L</div>
                <div></div>
            </div>
            
            <div id="playersList"></div>
            <div id="netStatus"></div>
            
            <div class="save-section">
                <div class="confirm-check">
                    <input type="checkbox" id="confirmSave">
                    <label for="confirmSave">I confirm to save (will clear current inputs)</label>
                </div>
                <button class="btn-save" id="saveBtn" onclick="saveSession()" disabled>💾 Save Session</button>
            </div>
        </div>
        
        <div id="page-history" class="page">
            <div id="historyList"></div>
        </div>
        
        <div id="page-stats" class="page">
            <div id="statsContent"></div>
        </div>
        
        <div id="page-login" class="page">
            <div id="loginContent"></div>
        </div>
    </div>
    
    <!-- Session Edit Modal -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Session</h2>
                <button class="modal-close" onclick="closeModal('sessionModal')">×</button>
            </div>
            <div class="modal-input">
                <label>Date</label>
                <input type="date" id="editDate">
            </div>
            <div class="table-header" style="border-radius: 8px 8px 0 0;">
                <div>Name</div>
                <div style="text-align:center">Buy-in</div>
                <div style="text-align:right">Stack</div>
                <div style="text-align:right">P&L</div>
                <div></div>
            </div>
            <div id="editPlayersList" style="background: var(--card); border-radius: 0 0 8px 8px; margin-bottom: 15px;"></div>
            <div class="modal-actions">
                <button class="btn-save-changes" onclick="saveSessionChanges()">💾 Save Changes</button>
                <button class="btn-delete-session" onclick="deleteCurrentSession()">🗑️ Delete</button>
            </div>
        </div>
    </div>
    
    <!-- Player Detail Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="playerModalTitle">Player History</h2>
                <button class="modal-close" onclick="closeModal('playerModal')">×</button>
            </div>
            <div class="stats-summary" style="margin-bottom: 15px;">
                <div class="stat-card">
                    <div class="label">Sessions</div>
                    <div class="value" id="playerTotalSessions">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Net</div>
                    <div class="value" id="playerTotalNet">0</div>
                </div>
            </div>
            <div id="playerSessionsList" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>
    
    <nav class="nav">
        <button class="nav-item active" onclick="showPage('session')">🃏 Session</button>
        <button class="nav-item" onclick="showPage('history')">📜 History</button>
        <button class="nav-item" onclick="showPage('stats')">📊 Stats</button>
        <button class="nav-item" onclick="showPage('login')">👤 Login</button>
    </nav>
    
    <script>
        let players = [];
        let sessions = JSON.parse(localStorage.getItem('pokerSessions') || '[]');
        let editingSessionId = null;
        
        // Community management
        let communities = JSON.parse(localStorage.getItem('pokerCommunities') || '[]');
        let currentCommunityId = localStorage.getItem('currentCommunityId') || 'default';
        
        // Filter sessions by current community
        function getCommunitySessions() {
            if (currentCommunityId === 'default') {
                return sessions.filter(s => !s.communityId || s.communityId === 'default');
            }
            return sessions.filter(s => s.communityId === currentCommunityId);
        }
        
        function saveCommunitySessions(communitySessions) {
            // Keep sessions from other communities + update current community sessions
            const otherSessions = sessions.filter(s => s.communityId && s.communityId !== currentCommunityId && currentCommunityId !== 'default');
            const defaultSessions = currentCommunityId === 'default' ? [] : sessions.filter(s => !s.communityId || s.communityId === 'default');
            
            if (currentCommunityId === 'default') {
                sessions = [...defaultSessions, ...communitySessions];
            } else {
                sessions = [...otherSessions, ...defaultSessions, ...communitySessions];
            }
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
        }
        
        function switchCommunity(communityId) {
            currentCommunityId = communityId;
            localStorage.setItem('currentCommunityId', communityId);
            renderCommunitySelector();
            renderPlayers();
            renderHistory();
            renderStats();
        }
        
        function renderCommunitySelector() {
            const select = document.getElementById('communitySelect');
            if (!select) return;
            
            let html = `<option value="default" ${currentCommunityId === 'default' ? 'selected' : ''}>My Community</option>`;
            communities.forEach(c => {
                html += `<option value="${c.id}" ${currentCommunityId === c.id ? 'selected' : ''}>${c.name}</option>`;
            });
            select.innerHTML = html;
        }
        
        function createCommunity(name) {
            if (!name.trim()) { alert('Please enter a community name'); return; }
            const community = { id: 'comm_' + Date.now(), name: name.trim(), createdAt: new Date().toISOString() };
            communities.push(community);
            localStorage.setItem('pokerCommunities', JSON.stringify(communities));
            currentCommunityId = community.id;
            localStorage.setItem('currentCommunityId', community.id);
            renderCommunitySelector();
            renderLoginPage();
            // Clear sessions for new community
            sessions = sessions.filter(s => s.communityId === currentCommunityId);
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
            alert('Community created! Now tracking sessions for: ' + community.name);
            showPage('session');
        }
        
        function deleteCommunity(communityId) {
            if (!confirm('Delete this community and all its sessions?')) return;
            communities = communities.filter(c => c.id !== communityId);
            localStorage.setItem('pokerCommunities', JSON.stringify(communities));
            sessions = sessions.filter(s => s.communityId !== communityId);
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
            if (currentCommunityId === communityId) {
                currentCommunityId = 'default';
                localStorage.setItem('currentCommunityId', 'default');
            }
            renderCommunitySelector();
            renderLoginPage();
        }
        
        const buyInInput = document.getElementById('buyInAmount');
        const newPlayerInput = document.getElementById('newPlayerName');
        const playersList = document.getElementById('playersList');
        const confirmCheck = document.getElementById('confirmSave');
        const saveBtn = document.getElementById('saveBtn');
        
        confirmCheck.addEventListener('change', () => { saveBtn.disabled = !confirmCheck.checked || players.length === 0; });
        
        function addPlayer() {
            const name = newPlayerInput.value.trim();
            const buyIn = parseFloat(buyInInput.value) || 1000;
            if (!name) { alert('Please enter a player name'); return; }
            players.push({ name, hands: 1, buyIn, stack: buyIn });
            newPlayerInput.value = '';
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        function removePlayer(index) {
            players.splice(index, 1);
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        function changeHands(index, delta) {
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            players[index].hands += delta;
            if (players[index].hands < 1) players[index].hands = 1;
            players[index].buyIn = players[index].hands * baseBuyIn;
            players[index].stack = players[index].buyIn;
            renderPlayers();
        }
        
        function updateStack(index, value) {
            players[index].stack = parseFloat(value) || 0;
            renderPlayers();
        }
        
        function updateAllStacks() {
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            players.forEach(p => { p.buyIn = p.hands * baseBuyIn; p.stack = p.buyIn; });
            renderPlayers();
        }
        
        function updateName(index, value) { players[index].name = value; renderPlayers(); }
        
        function calculateTotals() {
            let totalUp = 0, totalDown = 0;
            players.forEach(p => { const pnl = p.stack - p.buyIn; if (pnl >= 0) totalUp += pnl; else totalDown += pnl; });
            return { totalUp, totalDown, net: totalUp + totalDown };
        }
        
        function renderPlayers() {
            const { totalUp, totalDown, net } = calculateTotals();
            if (players.length === 0) {
                playersList.innerHTML = '<div class="empty">No players yet.</div>';
            } else {
                let html = '';
                players.forEach((p, i) => {
                    const pnl = p.stack - p.buyIn;
                    const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                    const pnlPrefix = pnl >= 0 ? '+' : '';
                    html += `<div class="player-row"><div><input type="text" class="name-input" value="${p.name}" onchange="updateName(${i}, this.value)"></div><div class="hands-control"><button class="btn-hands" onclick="changeHands(${i}, -1)">−</button><span class="hands-num">${p.hands}</span><button class="btn-hands" onclick="changeHands(${i}, 1)">+</button></div><div><input type="number" class="stack-input" value="${p.stack}" onchange="updateStack(${i}, this.value)"></div><div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(pnl).toLocaleString()}</div><button class="btn-delete" onclick="removePlayer(${i})">🗑️</button></div>`;
                });
                playersList.innerHTML = html;
            }
            renderNetStatus(net);
            renderTotals(totalUp, totalDown);
        }
        
        function renderNetStatus(net) {
            const netDiv = document.getElementById('netStatus');
            if (players.length === 0) { netDiv.innerHTML = ''; return; }
            if (Math.abs(net) < 1) netDiv.innerHTML = '<div class="net-status even">✅ Table is EVEN</div>';
            else if (net > 0) netDiv.innerHTML = `<div class="net-status win">📈 Table WINNING by ${Math.round(net).toLocaleString()}</div>`;
            else netDiv.innerHTML = `<div class="net-status loss">📉 Table LOSING by ${Math.round(Math.abs(net)).toLocaleString()}</div>`;
        }
        
        function renderTotals(totalUp, totalDown) {
            let totalsDiv = document.getElementById('totals');
            if (!totalsDiv) { totalsDiv = document.createElement('div'); totalsDiv.id = 'totals'; totalsDiv.className = 'totals'; document.body.appendChild(totalsDiv); }
            totalsDiv.innerHTML = `<div class="total-item"><div class="label">Total Up</div><div class="value">${Math.round(totalUp).toLocaleString()}</div></div><div class="total-item"><div class="label">Total Down</div><div class="value">${Math.round(totalDown).toLocaleString()}</div></div><div class="total-item"><div class="label">Net</div><div class="value">${Math.round(totalUp + totalDown).toLocaleString()}</div></div>`;
        }
        
        function saveSession() {
            const { net } = calculateTotals();
            if (Math.abs(net) >= 1) { alert('Cannot save: Table imbalance!'); return; }
            const communitySessions = getCommunitySessions();
            const session = { id: Date.now(), date: new Date().toISOString().split('T')[0], players: JSON.parse(JSON.stringify(players)), totalUp: calculateTotals().totalUp, totalDown: calculateTotals().totalDown, net, communityId: currentCommunityId };
            communitySessions.unshift(session);
            saveCommunitySessions(communitySessions);
            players = []; confirmCheck.checked = false; saveBtn.disabled = true;
            renderPlayers(); renderHistory(); renderStats(); alert('Session saved!');
        }
        
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            const communitySessions = getCommunitySessions();
            if (communitySessions.length === 0) { historyList.innerHTML = '<div class="empty">No sessions recorded yet.</div>'; return; }
            let html = '';
            communitySessions.forEach(session => {
                let biggestWinner = { name: '', pnl: -Infinity };
                session.players.forEach(p => { const pnl = p.stack - p.buyIn; if (pnl > biggestWinner.pnl) biggestWinner = { name: p.name, pnl }; });
                html += `<div class="history-item" onclick="openEditModal(${session.id})"><div class="history-header"><div><div class="history-date">${session.date}</div><div class="history-location">${session.players.length} players</div></div><div class="history-winner"><div class="label">Biggest Winner</div><div class="name">${biggestWinner.name || '-'}</div></div></div></div>`;
            });
            historyList.innerHTML = html;
        }
        
        function openEditModal(sessionId) {
            editingSessionId = sessionId;
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            document.getElementById('editDate').value = session.date;
            renderEditPlayers(session.players);
            document.getElementById('sessionModal').classList.add('active');
        }
        
        function renderEditPlayers(players) {
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            let html = '';
            players.forEach((p, i) => {
                const pnl = p.stack - p.buyIn;
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                const pnlPrefix = pnl >= 0 ? '+' : '';
                html += `<div class="player-edit-row"><input type="text" value="${p.name}" id="editName_${i}"><div style="text-align:center">${p.hands}</div><input type="number" value="${p.stack}" id="editStack_${i}"><div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(pnl)}</div><button class="btn-delete" onclick="removeEditPlayer(${i})">🗑️</button></div>`;
            });
            html += '<button class="btn-add" style="margin-top:10px;" onclick="addEditPlayer()">➕ Add Player</button>';
            document.getElementById('editPlayersList').innerHTML = html;
        }
        
        function removeEditPlayer(index) {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            session.players.splice(index, 1);
            renderEditPlayers(session.players);
        }
        
        function addEditPlayer() {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            session.players.push({ name: 'New Player', hands: 1, buyIn: baseBuyIn, stack: baseBuyIn });
            renderEditPlayers(session.players);
        }
        
        function saveSessionChanges() {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            session.date = document.getElementById('editDate').value;
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            session.players.forEach((p, i) => { p.name = document.getElementById('editName_' + i).value; p.stack = parseFloat(document.getElementById('editStack_' + i).value) || 0; p.buyIn = p.hands * baseBuyIn; });
            let totalUp = 0, totalDown = 0;
            session.players.forEach(p => { const pnl = p.stack - p.buyIn; if (pnl >= 0) totalUp += pnl; else totalDown += pnl; });
            session.totalUp = totalUp; session.totalDown = totalDown; session.net = totalUp + totalDown;
            const communitySessions = getCommunitySessions();
            saveCommunitySessions(communitySessions);
            closeModal('sessionModal'); renderHistory(); renderStats(); alert('Changes saved!');
        }
        
        function deleteCurrentSession() {
            if (!confirm('Are you sure you want to delete this session?')) return;
            const communitySessions = getCommunitySessions().filter(s => s.id !== editingSessionId);
            saveCommunitySessions(communitySessions);
            closeModal('sessionModal'); renderHistory(); renderStats();
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            if (modalId === 'sessionModal') editingSessionId = null;
        }
        
        function renderStats() {
            const statsDiv = document.getElementById('statsContent');
            const communitySessions = getCommunitySessions();
            if (communitySessions.length === 0) { statsDiv.innerHTML = '<div class="empty">No data yet. Play some sessions!</div>'; return; }
            
            const playerStats = {};
            let totalSessions = communitySessions.length, totalBuyIn = 0, totalFinal = 0, highestSessionWin = 0, highestSessionWinName = '', highestSessionLoss = 0, highestSessionLossName = '';
            
            communitySessions.forEach(session => {
                session.players.forEach(p => {
                    const pnl = p.stack - p.buyIn;
                    if (pnl > highestSessionWin) { highestSessionWin = pnl; highestSessionWinName = p.name; }
                    if (pnl < highestSessionLoss) { highestSessionLoss = pnl; highestSessionLossName = p.name; }
                    if (!playerStats[p.name]) playerStats[p.name] = { buyIn: 0, final: 0, sessions: 0, net: 0, wins: 0, losses: 0, winStreak: 0, maxWinStreak: 0, lossStreak: 0, maxLossStreak: 0 };
                    playerStats[p.name].buyIn += p.buyIn; 
                    playerStats[p.name].final += p.stack; 
                    playerStats[p.name].sessions += 1; 
                    playerStats[p.name].net += pnl;
                    if (pnl > 0) { playerStats[p.name].wins++; }
                    else if (pnl < 0) { playerStats[p.name].losses++; }
                    totalBuyIn += p.buyIn; totalFinal += p.stack;
                });
            });
            
            // Calculate streaks for each player
            Object.keys(playerStats).forEach(playerName => {
                let currentWinStreak = 0, maxWinStreak = 0;
                let currentLossStreak = 0, maxLossStreak = 0;
                sessions.forEach(session => {
                    const player = session.players.find(p => p.name === playerName);
                    if (player) {
                        const pnl = player.stack - player.buyIn;
                        if (pnl > 0) { 
                            currentWinStreak++; 
                            if (currentWinStreak > maxWinStreak) maxWinStreak = currentWinStreak;
                            currentLossStreak = 0;
                        } else if (pnl < 0) { 
                            currentLossStreak++; 
                            if (currentLossStreak > maxLossStreak) maxLossStreak = currentLossStreak;
                            currentWinStreak = 0;
                        } else {
                            currentWinStreak = 0;
                            currentLossStreak = 0;
                        }
                    }
                });
                playerStats[playerName].maxWinStreak = maxWinStreak;
                playerStats[playerName].maxLossStreak = maxLossStreak;
            });
            
            // Find overall streaks
            let longestWinStreak = { name: '', count: 0 };
            let longestLossStreak = { name: '', count: 0 };
            Object.entries(playerStats).forEach(([name, stats]) => { 
                if (stats.maxWinStreak > longestWinStreak.count) longestWinStreak = { name, count: stats.maxWinStreak }; 
                if (stats.maxLossStreak > longestLossStreak.count) longestLossStreak = { name, count: stats.maxLossStreak }; 
            });
            
            const avgBuyInPerSession = totalBuyIn / totalSessions;
            
            let highestWinner = { name: '', net: -Infinity };
            Object.entries(playerStats).forEach(([name, stats]) => { if (stats.net > highestWinner.net) highestWinner = { name, net: stats.net }; });
            
            // Overall stats
            const totalWins = Object.values(playerStats).reduce((sum, p) => sum + p.wins, 0);
            const totalLosses = Object.values(playerStats).reduce((sum, p) => sum + p.losses, 0);
            const overallWinRate = totalSessions > 0 ? Math.round((totalWins / totalSessions) * 100) : 0;
            
            let html = `<div class="stats-summary">
                <div class="stat-card"><div class="label">Total Sessions</div><div class="value">${totalSessions}</div></div>
                <div class="stat-card"><div class="label">Total Players</div><div class="value">${Object.keys(playerStats).length}</div></div>
                <div class="stat-card"><div class="label">Avg Buy-in/Session</div><div class="value">${Math.round(avgBuyInPerSession).toLocaleString()}</div></div>
                <div class="stat-card"><div class="label">Win Rate</div><div class="value ${overallWinRate >= 50 ? 'positive' : 'negative'}">${overallWinRate}%</div></div>
                <div class="stat-card"><div class="label">🏆 Best Win Streak</div><div class="value">${longestWinStreak.name ? longestWinStreak.name + ' (' + longestWinStreak.count + ')' : '-'}</div></div>
                <div class="stat-card"><div class="label">📉 Worst Loss Streak</div><div class="value negative">${longestLossStreak.name ? longestLossStreak.name + ' (' + longestLossStreak.count + ')' : '-'}</div></div>
                <div class="stat-card full"><div class="label">🏆 Highest Accumulative Winner</div><div class="value ${highestWinner.net >= 0 ? 'positive' : 'negative'}">${highestWinner.name || '-'} (${highestWinner.net >= 0 ? '+' : ''}${Math.round(highestWinner.net).toLocaleString()})</div></div>
            </div>`;
            
            // Accumulated Winnings Chart with filter
            const playerNames = ['All Players', ...Object.keys(playerStats).sort()];
            html += `<div class="chart-container">
                <div class="chart-title">📈 Accumulated Winnings</div>
                <div class="chart-filter">
                    <select id="playerFilter" onchange="renderPnLChart()">
                        ${playerNames.map(name => `<option value="${name}">${name}</option>`).join('')}
                    </select>
                </div>
                <div class="line-chart" id="pnlChart"></div>
            </div>`;
            
            // Bar chart
            html += `<div class="chart-container"><div class="chart-title">📊 P&L by Player</div><div class="bar-chart">`;
            
            const sortedPlayers = Object.entries(playerStats).sort((a, b) => b[1].net - a[1].net);
            const maxNet = Math.max(...sortedPlayers.map(p => Math.abs(p[1].net)), 1);
            
            sortedPlayers.forEach(([name, stats]) => { const height = (Math.abs(stats.net) / maxNet) * 100; html += `<div class="bar"><div class="bar-value">${stats.net >= 0 ? '+' : ''}${Math.round(stats.net)}</div><div class="bar-fill ${stats.net >= 0 ? 'positive' : 'negative'}" style="height: ${height}%;"></div><div class="bar-label">${name}</div></div>`; });
            
            html += '</div></div><div class="player-stats"><h3>🏆 Player Performance (Click to view)</h3><div class="player-stat-row header"><div>Player</div><div>Sessions</div><div>Win %</div><div>Net</div></div>';
            
            sortedPlayers.forEach(([name, stats]) => { 
                const winRate = stats.sessions > 0 ? Math.round((stats.wins / stats.sessions) * 100) : 0;
                const pnlClass = stats.net >= 0 ? 'pnl-positive' : 'pnl-negative'; 
                html += `<div class="player-stat-row" onclick="showPlayerDetail('${name}')"><div>${name}</div><div>${stats.sessions}</div><div class="${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div><div class="${pnlClass}">${stats.net >= 0 ? '+' : ''}${Math.round(stats.net).toLocaleString()}</div></div>`; 
            });
            
            html += '</div>';
            statsDiv.innerHTML = html;
            
            // Render the line chart after HTML is set
            setTimeout(renderPnLChart, 0);
        }
        
        function renderPnLChart() {
            const container = document.getElementById('pnlChart');
            if (!container) return;
            
            const selectedPlayer = document.getElementById('playerFilter')?.value || 'All Players';
            
            // Build cumulative winnings data
            const communitySessions = getCommunitySessions();
            const sortedSessions = [...communitySessions].sort((a, b) => new Date(a.date) - new Date(b.date));
            let cumulative = 0;
            const chartData = [];
            
            sortedSessions.forEach(session => {
                let sessionPnl = 0;
                if (selectedPlayer === 'All Players') {
                    session.players.forEach(p => { sessionPnl += (p.stack - p.buyIn); });
                } else {
                    const player = session.players.find(p => p.name === selectedPlayer);
                    if (player) sessionPnl = player.stack - player.buyIn;
                }
                cumulative += sessionPnl;
                chartData.push({ date: session.date, pnl: sessionPnl, cumulative });
            });
            
            if (chartData.length === 0) { container.innerHTML = '<div class="empty">No data</div>'; return; }
            
            // SVG line chart - HighRoll style
            const width = container.clientWidth || 300;
            const height = 180;
            const padding = 40;
            
            const minCum = Math.min(...chartData.map(d => d.cumulative), 0);
            const maxCum = Math.max(...chartData.map(d => d.cumulative), 0);
            const range = maxCum - minCum || 1;
            
            const getX = (i) => padding + (i / (chartData.length - 1 || 1)) * (width - 2 * padding);
            const getY = (val) => height - padding - ((val - minCum) / range) * (height - 2 * padding);
            
            let pathD = '';
            chartData.forEach((d, i) => {
                const x = getX(i);
                const y = getY(d.cumulative);
                pathD += (i === 0 ? 'M' : 'L') + x + ',' + y;
            });
            
            const isPositive = chartData[chartData.length - 1]?.cumulative >= 0;
            const lineColor = isPositive ? '#f6465d' : '#0b8a4e';
            const fillColor = isPositive ? 'rgba(246, 70, 93, 0.1)' : 'rgba(11, 138, 78, 0.1)';
            
            // Create area fill
            let areaD = pathD + ` L${getX(chartData.length - 1)},${getY(0)} L${getX(0)},${getY(0)} Z`;
            
            // Create dots and labels
            let dots = '';
            let labels = '';
            chartData.forEach((d, i) => {
                if (i === 0 || i === chartData.length - 1 || i === Math.floor(chartData.length / 2)) {
                    const x = getX(i);
                    const y = getY(d.cumulative);
                    dots += `<circle cx="${x}" cy="${y}" r="4" fill="${lineColor}"/>`;
                    labels += `<text x="${x}" y="${height - 10}" text-anchor="middle" fill="#848e9c" font-size="10">${d.date.slice(5)}</text>`;
                }
            });
            
            // Y-axis labels
            const yLabels = `
                <text x="${padding - 5}" y="${getY(maxCum)}" text-anchor="end" fill="#848e9c" font-size="10">+${(maxCum/1000).toFixed(0)}k</text>
                <text x="${padding - 5}" y="${getY(0)}" text-anchor="end" fill="#848e9c" font-size="10">0</text>
                <text x="${padding - 5}" y="${getY(minCum)}" text-anchor="end" fill="#848e9c" font-size="10">${(minCum/1000).toFixed(0)}k</text>
            `;
            
            container.innerHTML = `<svg viewBox="0 0 ${width} ${height}">
                <line x1="${padding}" y1="${getY(0)}" x2="${width - padding}" y2="${getY(0)}" stroke="#2a2e39" stroke-width="1"/>
                <path d="${areaD}" fill="${fillColor}"/>
                <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2.5"/>
                ${dots}
                ${labels}
                ${yLabels}
            </svg>`;
        }
        
        function showPlayerDetail(playerName) {
            document.getElementById('playerModalTitle').textContent = playerName;
            
            // Calculate stats for this player
            const playerSessions = [];
            let wins = 0, losses = 0;
            const communitySessions = getCommunitySessions();
            
            communitySessions.forEach(session => {
                const player = session.players.find(p => p.name === playerName);
                if (player) { 
                    const pnl = player.stack - player.buyIn;
                    if (pnl > 0) wins++;
                    else if (pnl < 0) losses++;
                    playerSessions.push({ date: session.date, pnl: pnl, buyIn: player.buyIn, final: player.stack, hands: player.hands }); 
                }
            });
            
            playerSessions.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const totalNet = playerSessions.reduce((sum, s) => sum + s.pnl, 0);
            const totalSessions = playerSessions.length;
            const winRate = totalSessions > 0 ? Math.round((wins / totalSessions) * 100) : 0;
            
            // Calculate streaks
            let currentStreak = 0, maxWinStreak = 0, maxLossStreak = 0, streakType = '';
            playerSessions.forEach(s => {
                if (s.pnl > 0) {
                    if (streakType === 'win') { currentStreak++; }
                    else { currentStreak = 1; streakType = 'win'; }
                    if (currentStreak > maxWinStreak) maxWinStreak = currentStreak;
                } else if (s.pnl < 0) {
                    if (streakType === 'loss') { currentStreak++; }
                    else { currentStreak = 1; streakType = 'loss'; }
                    if (currentStreak > maxLossStreak) maxLossStreak = currentStreak;
                } else {
                    currentStreak = 0; streakType = '';
                }
            });
            
            document.getElementById('playerTotalSessions').textContent = totalSessions;
            document.getElementById('playerTotalNet').textContent = (totalNet >= 0 ? '+' : '') + Math.round(totalNet).toLocaleString();
            document.getElementById('playerTotalNet').className = 'value ' + (totalNet >= 0 ? 'positive' : 'negative');
            
            // Show detailed stats
            let statsHtml = `<div class="player-stats-grid">
                <div class="mini-stat"><div class="label">Win Rate</div><div class="value ${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div></div>
                <div class="mini-stat"><div class="label">Wins</div><div class="value positive">${wins}</div></div>
                <div class="mini-stat"><div class="label">Losses</div><div class="value negative">${losses}</div></div>
                <div class="mini-stat"><div class="label">Best Streak</div><div class="value">${maxWinStreak}</div></div>
                <div class="mini-stat"><div class="label">Worst Streak</div><div class="value negative">${maxLossStreak}</div></div>
                <div class="mini-stat"><div class="label">Total Net</div><div class="value ${totalNet >= 0 ? 'positive' : 'negative'}">${totalNet >= 0 ? '+' : ''}${Math.round(totalNet).toLocaleString()}</div></div>
            </div>`;
            
            let html = '<div class="player-detail-header" style="margin-bottom:10px;font-size:12px;color:var(--text-dim);display:grid;grid-template-columns:2fr 1fr 1fr 1fr;"><div>Date</div><div>Buy-in</div><div>Stack</div><div>Net</div></div>';
            playerSessions.forEach(s => { const pnlClass = s.pnl >= 0 ? 'positive' : 'negative'; const pnlPrefix = s.pnl >= 0 ? '+' : ''; html += `<div class="player-detail-row"><div class="date">${s.date}</div><div>${Math.round(s.buyIn).toLocaleString()}</div><div>${Math.round(s.final).toLocaleString()}</div><div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(s.pnl).toLocaleString()}</div></div>`; });
            
            document.getElementById('playerSessionsList').innerHTML = statsHtml + (html || '<div class="empty">No sessions</div>');
            document.getElementById('playerModal').classList.add('active');
        }
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageName).classList.add('active');
            event.target.classList.add('active');
            if (pageName === 'history') renderHistory();
            if (pageName === 'stats') renderStats();
        }
        
        renderPlayers(); renderHistory();
        newPlayerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });
        
        // Initialize community selector
        renderCommunitySelector();
        renderLoginPage();
        
        function renderLoginPage() {
            const loginDiv = document.getElementById('loginContent');
            const communitySessions = getCommunitySessions();
            
            const currentCommunityName = currentCommunityId === 'default' ? 'My Community' : (communities.find(c => c.id === currentCommunityId)?.name || 'Unknown');
            
            let html = `
                <div class="login-container">
                    <div class="login-header">
                        <h2>👤 Login</h2>
                        <p>Manage your communities</p>
                    </div>
                    
                    <div style="background: var(--card); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                        <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 5px;">Current Community</div>
                        <div style="font-size: 18px; font-weight: bold; color: var(--gold);">${currentCommunityName}</div>
                        <div style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">${communitySessions.length} sessions recorded</div>
                    </div>
                    
                    <button class="btn-community secondary" onclick="document.getElementById('createCommunityForm').style.display='block'">➕ Create New Community</button>
                    
                    <div id="createCommunityForm" class="create-community-form" style="display:none;">
                        <h3>Create Community</h3>
                        <input type="text" id="newCommunityName" placeholder="Community name (e.g., Friday Night Guys)">
                        <button class="btn-community" onclick="doCreateCommunity()">Create</button>
                        <button class="btn-community secondary" onclick="document.getElementById('createCommunityForm').style.display='none'" style="margin-top:10px;">Cancel</button>
                    </div>
                    
                    <div class="community-list" style="margin-top: 30px;">
                        <h3 style="color: var(--gold); margin-bottom: 15px;">Your Communities</h3>
                        
                        <div class="community-item ${currentCommunityId === 'default' ? 'active' : ''}" onclick="switchCommunity('default')" style="margin-bottom: 10px; cursor: pointer; border: 2px solid ${currentCommunityId === 'default' ? 'var(--gold)' : 'transparent'};">
                            <div>
                                <div class="name">🏠 My Community</div>
                                <div class="sessions">${sessions.filter(s => !s.communityId || s.communityId === 'default').length} sessions</div>
                            </div>
                            ${currentCommunityId === 'default' ? '<span style="color: var(--gold);">✓</span>' : ''}
                        </div>
            `;
            
            communities.forEach(c => {
                const sessionCount = sessions.filter(s => s.communityId === c.id).length;
                html += `
                    <div class="community-item ${currentCommunityId === c.id ? 'active' : ''}" onclick="switchCommunity('${c.id}')" style="cursor: pointer; border: 2px solid ${currentCommunityId === c.id ? 'var(--gold)' : 'transparent'};">
                        <div>
                            <div class="name">👥 ${c.name}</div>
                            <div class="sessions">${sessionCount} sessions • Created ${new Date(c.createdAt).toLocaleDateString()}</div>
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            ${currentCommunityId === c.id ? '<span style="color: var(--gold);">✓</span>' : ''}
                            <button onclick="event.stopPropagation(); deleteCommunity('${c.id}')" style="background: transparent; border: none; color: var(--profit); cursor: pointer; font-size: 16px;">🗑️</button>
                        </div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                    
                    <div style="margin-top: 30px; padding: 15px; background: var(--card); border-radius: 8px; font-size: 12px; color: var(--text-dim);">
                        <strong>💡 Tip:</strong> Each community has its own separate session data. Switch between communities to track different poker groups.
                    </div>
                </div>
            `;
            
            loginDiv.innerHTML = html;
        }
        
        function doCreateCommunity() {
            const name = document.getElementById('newCommunityName').value;
            createCommunity(name);
        }
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageName).classList.add('active');
            event.target.classList.add('active');
            if (pageName === 'history') renderHistory();
            if (pageName === 'stats') renderStats();
            if (pageName === 'login') renderLoginPage();
        }
    </script>
</body>
</html>
