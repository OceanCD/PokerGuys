<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokerGuys - Texas Hold'em Session Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        :root { --bg: #0b0e11; --card: #1e2329; --border: #2a2e39; --gold: #f0b90b; --profit: #f6465d; --loss: #0b8a4e; --text: #eaecef; --text-dim: #848e9c; }
        
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 70px; }
        
        .header { text-align: center; padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        .header h1 { font-size: 24px; color: var(--gold); margin-bottom: 5px; }
        .header p { color: var(--text-dim); font-size: 12px; }
        .community-selector { margin-top: 10px; padding: 8px 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
        .community-selector span { color: var(--gold); font-weight: bold; }
        
        .input-section { padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        
        input[type="number"], input[type="text"], input[type="date"] { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; }
        input:focus { outline: none; border-color: var(--gold); }
        
        .btn-add { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .table-header { display: grid; grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr; padding: 12px 15px; background: var(--card); font-size: 12px; font-weight: 600; color: var(--gold); }
        
        .player-row { display: grid; grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr; padding: 10px 15px; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); }
        .player-row:nth-child(even) { background: rgba(30, 35, 41, 0.5); }
        
        .name-input { background: transparent !important; border: none !important; padding: 5px !important; font-size: 14px !important; color: var(--text) !important; width: 100%; }
        
        .hands-control { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-hands { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: #000; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .hands-num { font-weight: bold; min-width: 25px; text-align: center; }
        
        .stack-input { background: transparent !important; border: none !important; padding: 5px !important; text-align: right; font-size: 14px !important; color: var(--gold) !important; width: 100%; }
        
        .pnl { text-align: right; font-weight: bold; font-size: 14px; }
        .pnl.positive { color: var(--profit); }
        .pnl.negative { color: var(--loss); }
        
        .btn-delete { background: transparent; border: none; font-size: 18px; cursor: pointer; padding: 5px; }
        
        .net-status { padding: 15px; margin: 10px 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 16px; }
        .net-status.even { background: rgba(11, 138, 78, 0.2); color: var(--loss); border: 1px solid var(--loss); }
        .net-status.win { background: rgba(246, 70, 93, 0.2); color: var(--profit); border: 1px solid var(--profit); }
        .net-status.loss { background: rgba(11, 138, 78, 0.2); color: var(--loss); border: 1px solid var(--loss); }
        
        .totals { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; background: var(--card); border-top: 2px solid var(--gold); position: fixed; bottom: 0; left: 0; right: 0; }
        .total-item { text-align: center; }
        .total-item .label { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
        .total-item .value { font-size: 16px; font-weight: bold; }
        
        .save-section { padding: 15px; padding-bottom: 90px; }
        .btn-save { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-save:disabled { background: var(--border); color: var(--text-dim); }
        
        .confirm-check { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 10px; background: var(--card); border-radius: 8px; }
        .confirm-check input { width: 20px; height: 20px; }
        
        .nav { display: flex; background: var(--card); border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
        .nav-item { flex: 1; padding: 12px; text-align: center; color: var(--text-dim); font-size: 12px; cursor: pointer; border: none; background: transparent; }
        .nav-item.active { color: var(--gold); }
        
        .footer { text-align: center; padding: 15px; color: var(--text-dim); font-size: 11px; background: var(--bg); }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .history-item { padding: 15px; background: var(--card); border-radius: 8px; margin: 10px 15px; cursor: pointer; }
        .history-header { display: flex; justify-content: space-between; align-items: center; }
        .history-date { font-weight: bold; color: var(--gold); }
        .history-location { color: var(--text-dim); font-size: 12px; }
        .history-winner { text-align: right; }
        .history-winner .label { font-size: 10px; color: var(--text-dim); }
        .history-winner .name { font-weight: bold; color: var(--profit); font-size: 14px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: var(--bg); max-width: 600px; margin: 20px auto; border-radius: 12px; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .modal-header h2 { color: var(--gold); font-size: 18px; }
        .modal-close { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--text-dim); }
        
        .modal-input { margin-bottom: 15px; }
        .modal-input label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        
        .player-edit-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr; gap: 5px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .player-edit-row input { padding: 8px; font-size: 13px; }
        .player-edit-row .even { color: var(--gold); }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-save-changes { flex: 1; padding: 12px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-delete-session { flex: 1; padding: 12px; background: transparent; color: var(--profit); border: 1px solid var(--profit); border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card.full { grid-column: span 2; }
        .stat-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
        .stat-card .value { font-size: 18px; font-weight: bold; color: var(--gold); }
        .stat-card .value.positive { color: var(--profit); }
        .stat-card .value.negative { color: var(--loss); }
        
        .chart-container { padding: 15px; background: var(--card); margin: 10px 15px; border-radius: 8px; }
        .chart-title { color: var(--gold); margin-bottom: 10px; font-size: 14px; }
        .chart-filter { margin-bottom: 10px; }
        .chart-filter select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
        
        .line-chart { width: 100%; height: 200px; position: relative; padding-top: 10px; }
        .line-chart svg { width: 100%; height: 100%; }
        .line-chart { position: relative; }
        
        .player-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .mini-stat { background: var(--card); padding: 10px; border-radius: 6px; text-align: center; }
        .mini-stat .label { font-size: 10px; color: var(--text-dim); }
        .mini-stat .value { font-size: 14px; font-weight: bold; color: var(--gold); }
        
        .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 150px; padding-top: 20px; }
        .bar { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .bar-value { font-size: 10px; margin-bottom: 5px; color: var(--text-dim); }
        .bar-fill { width: 100%; border-radius: 4px 4px 0 0; }
        .bar-fill.positive { background: var(--profit); }
        .bar-fill.negative { background: var(--loss); }
        .bar-label { font-size: 10px; color: var(--text-dim); margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50px; }
        
        .player-stats { padding: 15px; }
        .player-stats h3 { color: var(--gold); margin-bottom: 10px; font-size: 16px; }
        
        .player-stat-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
        .player-stat-row:hover { background: var(--card); }
        .player-stat-row.header { cursor: default; }
        .player-stat-row.header:hover { background: transparent; }
        
        .player-detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .player-detail-row .date { color: var(--gold); font-weight: bold; }
        .player-detail-row .pnl { font-weight: bold; }
        
        .empty { text-align: center; padding: 40px; color: var(--text-dim); }
        
        .login-container { padding: 20px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { color: var(--gold); font-size: 24px; margin-bottom: 10px; }
        .login-header p { color: var(--text-dim); font-size: 14px; }
        
        .login-form { background: var(--card); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .login-form input { margin-bottom: 15px; }
        .login-form .btn-login { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .community-info { background: var(--card); padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .community-info .code { font-size: 32px; font-weight: bold; color: var(--gold); letter-spacing: 4px; margin: 10px 0; }
        .community-info .members { font-size: 12px; color: var(--text-dim); }
        
        .community-list { margin-top: 20px; }
        .community-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 8px; margin-bottom: 10px; }
        .community-item .name { font-weight: bold; }
        .community-item .sessions { font-size: 12px; color: var(--text-dim); }
        .community-item.active { border: 2px solid var(--gold); }
        
        .btn-community { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-community.secondary { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        
        .create-community-form { background: var(--card); padding: 20px; border-radius: 8px; margin-top: 20px; }
        .create-community-form h3 { color: var(--gold); margin-bottom: 15px; }
        .create-community-form input { margin-bottom: 15px; }
        
        .import-section { background: var(--card); padding: 20px; border-radius: 8px; margin-top: 20px; }
        .import-section h3 { color: var(--gold); margin-bottom: 15px; }
        .import-section .developing-badge { 
            display: block; 
            background: #f0b90b; 
            color: #000; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 14px; 
            text-align: center; 
            margin-bottom: 10px; 
        }
        .import-section .hint { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
        .import-section input[type="file"] { margin-bottom: 10px; }
        .import-preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin: 10px 0; display: none; }
        .import-status { padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
        .import-status.loading { background: rgba(240, 185, 11, 0.2); color: var(--gold); display: block; }
        .import-status.success { background: rgba(11, 138, 78, 0.2); color: #0b8a4e; display: block; }
        .import-status.error { background: rgba(246, 70, 93, 0.2); color: #f6465d; display: block; }
        
        @media (min-width: 768px) { .container { max-width: 600px; margin: 0 auto; } }

        /* New stats styles */
        .stats-summary-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 15px 10px; }
        .stat-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
        .stat-card .value.gold { color: var(--gold); }

        .player-stat-row-ext { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; padding: 10px 10px; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; overflow-x: auto; }
        .session-filter { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .session-filter select { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; font-size: 12px; }
        .player-stat-row-ext:hover { background: var(--card); }
        .player-stat-row-ext.header { cursor: default; font-weight: 600; color: var(--gold); font-size: 11px; }
        .player-stat-row-ext.header:hover { background: transparent; }

        .streak-hot { color: #ff6b35; font-weight: bold; }
        .streak-cold { color: #4fc3f7; font-weight: bold; }
        .streak-neutral { color: var(--text-dim); }

        .shark-badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .shark-s { background: rgba(240,185,11,0.3); color: var(--gold); }
        .shark-a { background: rgba(246,70,93,0.2); color: var(--profit); }
        .shark-b { background: rgba(11,138,78,0.2); color: var(--loss); }
        .shark-c { background: rgba(132,142,156,0.2); color: var(--text-dim); }

        .h2h-section { padding: 15px; }
        .h2h-section h3 { color: var(--gold); margin-bottom: 12px; font-size: 16px; }
        .h2h-selectors { display: flex; gap: 10px; margin-bottom: 12px; }
        .h2h-selectors select { flex: 1; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
        .h2h-result { background: var(--card); border-radius: 8px; padding: 15px; text-align: center; }
        .h2h-vs { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .h2h-player { flex: 1; }
        .h2h-player .h2h-name { font-weight: bold; font-size: 15px; color: var(--gold); }
        .h2h-player .h2h-wins { font-size: 28px; font-weight: bold; }
        .h2h-player .h2h-wins.winner { color: var(--profit); }
        .h2h-player .h2h-wins.loser { color: var(--loss); }
        .h2h-divider { font-size: 18px; color: var(--text-dim); }
        .h2h-meta { font-size: 12px; color: var(--text-dim); }

        .monthly-chart-section { padding: 15px; }
        .monthly-chart-section h3 { color: var(--gold); margin-bottom: 10px; font-size: 16px; }
        .monthly-bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 160px; padding-top: 20px; overflow-x: auto; min-width: 0; }
        .monthly-bar { flex: 0 0 auto; min-width: 36px; display: flex; flex-direction: column; align-items: center; }
        .monthly-bar-value { font-size: 9px; margin-bottom: 3px; color: var(--text-dim); white-space: nowrap; }
        .monthly-bar-fill { width: 28px; border-radius: 4px 4px 0 0; min-height: 2px; }
        .monthly-bar-fill.positive { background: var(--profit); }
        .monthly-bar-fill.negative { background: var(--loss); transform-origin: bottom; }
        .monthly-bar-label { font-size: 9px; color: var(--text-dim); margin-top: 4px; text-align: center; white-space: nowrap; }
        .monthly-zero-line { width: 100%; height: 1px; background: var(--border); margin: 0; }

        .pnl-positive { color: var(--profit); font-weight: bold; }
        .pnl-negative { color: var(--loss); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🃏 PokerGuys</h1>
            <p>Texas Hold'em Session Tracker</p>
            <div class="community-selector" id="communitySelector">
                <span id="communityName">☁️ Not connected</span>
            </div>
        </div>
        
        <div id="page-session" class="page active">
            <div class="input-section">
                <div class="input-row">
                    <div class="input-group">
                        <label>Buy-in Amount</label>
                        <input type="number" id="buyInAmount" value="1000" step="100" onchange="updateAllStacks()">
                    </div>
                    <div class="input-group">
                        <label>New Player</label>
                        <input type="text" id="newPlayerName" placeholder="Nickname...">
                    </div>
                </div>
                <button class="btn-add" onclick="addPlayer()">➕ Add Player</button>
            </div>
            
            <div class="table-header">
                <div>Name</div>
                <div style="text-align:center">Buy-in</div>
                <div style="text-align:right">Stack</div>
                <div style="text-align:right">P&L</div>
                <div></div>
            </div>
            
            <div id="playersList"></div>
            <div id="netStatus"></div>
            
            <div class="save-section">
                <div class="confirm-check">
                    <input type="checkbox" id="confirmSave">
                    <label for="confirmSave">I confirm to save (will clear current inputs)</label>
                </div>
                <button class="btn-save" id="saveBtn" onclick="saveSession()" disabled>💾 Save Session</button>
            </div>
        </div>
        
        <div id="page-history" class="page">
            <div id="historyList"></div>
        </div>
        
        <div id="page-stats" class="page">
            <div id="statsContent"></div>
        </div>
        
        <div id="page-login" class="page">
            <div id="loginContent"></div>
        </div>
    </div>
    
    <!-- Session Edit Modal -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Session</h2>
                <button class="modal-close" onclick="closeModal('sessionModal')">×</button>
            </div>
            <div class="modal-input">
                <label>Date</label>
                <input type="date" id="editDate">
            </div>
            <div class="table-header" style="border-radius: 8px 8px 0 0;">
                <div>Name</div>
                <div style="text-align:center">Buy-in</div>
                <div style="text-align:right">Stack</div>
                <div style="text-align:right">P&L</div>
                <div></div>
            </div>
            <div id="editPlayersList" style="background: var(--card); border-radius: 0 0 8px 8px; margin-bottom: 15px;"></div>
            <div class="modal-actions">
                <button class="btn-save-changes" onclick="saveSessionChanges()">💾 Save Changes</button>
                <button class="btn-delete-session" onclick="deleteCurrentSession()">🗑️ Delete</button>
            </div>
        </div>
    </div>
    
    <!-- Player Detail Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="playerModalTitle">Player History</h2>
                <button class="modal-close" onclick="closeModal('playerModal')">×</button>
            </div>
            <div class="stats-summary" style="margin-bottom: 15px;">
                <div class="stat-card">
                    <div class="label">Sessions</div>
                    <div class="value" id="playerTotalSessions">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Net</div>
                    <div class="value" id="playerTotalNet">0</div>
                </div>
            </div>
            <div id="playerSessionsList" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>
    
    <nav class="nav">
        <button class="nav-item active" onclick="showPage('session')">🃏 Session</button>
        <button class="nav-item" onclick="showPage('history')">📜 History</button>
        <button class="nav-item" onclick="showPage('stats')">📊 Stats</button>
        <button class="nav-item" onclick="showPage('login')">👤 Login</button>
    </nav>
    
    <script>
        let players = [];
        let sessions = JSON.parse(localStorage.getItem('pokerSessions') || '[]');
        let editingSessionId = null;
        
        // Community management with Supabase
        let supabaseClient = null;
        let currentUser = null;
        let currentCommunity = null;
        
        // Supabase config - replace with your credentials
        const SUPABASE_URL = 'https://nqejbumjkezgvnynxlol.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xZWpidW1qa2V6Z3ZueW54bG9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODA0OTgsImV4cCI6MjA4ODA1NjQ5OH0.YSXpYe-F5wlSQA3zY-ors_G28pS_kQNsINjLv3kpLdc';
        
        async function initSupabase() {
            if (typeof supabase === 'undefined') {
                // Load Supabase script
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
                script.onload = () => {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    checkLoginStatus();
                };
                document.head.appendChild(script);
            } else {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkLoginStatus();
            }
        }
        
        async function checkLoginStatus() {
            const savedCommunity = localStorage.getItem('pokerCommunity');
            const savedUser = localStorage.getItem('pokerUser');
            
            if (savedCommunity && savedUser) {
                currentCommunity = JSON.parse(savedCommunity);
                currentUser = JSON.parse(savedUser);
                await loadCloudSessions();
                renderLoginPage();
                renderCommunitySelector();
                renderHistory();
                renderStats();
            }
        }
        
        async function loginWithCommunity() {
            const name = document.getElementById('loginName').value.trim();
            const communityName = document.getElementById('newCommunityNameInput').value.trim();
            const code = document.getElementById('loginCode').value.trim().toUpperCase();
            
            if (!name || !code) { alert('Please enter your name and community code'); return; }
            
            try {
                // Try to find community
                const { data: community, error } = await supabaseClient
                    .from('communities')
                    .select('*')
                    .eq('code', code)
                    .single();
                
                if (error && error.code !== 'PGRST116') throw error;
                
                if (community) {
                    // Community exists - try to join or already member
                    const { data: existingMember } = await supabaseClient
                        .from('community_members')
                        .select('*')
                        .eq('community_id', community.id)
                        .eq('user_name', name)
                        .single();
                    
                    let userRole = 'member';
                    if (existingMember) {
                        userRole = existingMember.role || 'member';
                    } else {
                        // Join as member
                        await supabaseClient
                            .from('community_members')
                            .insert({ community_id: community.id, user_name: name, role: 'member' });
                    }
                    
                    currentCommunity = community;
                    currentUser = { name, role: userRole };
                    
                    // Save to localStorage
                    localStorage.setItem('pokerCommunity', JSON.stringify(community));
                    localStorage.setItem('pokerUser', JSON.stringify({ name, role: userRole }));
                    
                    await loadCloudSessions();
                    alert(`Welcome back! Joined community: ${community.name}`);
                } else {
                    // Create new community
                    const { data: newCommunity, error: createError } = await supabaseClient
                        .from('communities')
                        .insert({ name: communityName || (name + "'s Poker Group"), code: code, owner_name: name })
                        .select()
                        .single();
                    
                    if (createError) throw createError;
                    
                    // Add creator as owner
                    await supabaseClient
                        .from('community_members')
                        .insert({ community_id: newCommunity.id, user_name: name, role: 'owner' });
                    
                    currentCommunity = newCommunity;
                    currentUser = { name, role: 'owner' };
                    
                    localStorage.setItem('pokerCommunity', JSON.stringify(newCommunity));
                    localStorage.setItem('pokerUser', JSON.stringify({ name, role: 'owner' }));
                    
                    sessions = []; // Start fresh
                    saveToLocalStorage();
                    
                    alert(`Community created! Your code: ${code}\nShare this code with friends!`);
                }
                
                renderLoginPage();
                renderCommunitySelector();
                renderPlayers();
                renderHistory();
                renderStats();
                
            } catch (err) {
                console.error('Login error:', err);
                alert('Error: ' + err.message);
            }
        }
        
        async function loadCloudSessions() {
            if (!currentCommunity) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('sessions')
                    .select('*')
                    .eq('community_id', currentCommunity.id)
                    .order('date', { ascending: false });
                
                if (error) throw error;
                
                sessions = data || [];
                saveToLocalStorage();
            } catch (err) {
                console.error('Load sessions error:', err);
            }
        }
        
        async function saveSessionToCloud(sessionData) {
            if (!currentCommunity) {
                // Fallback to local
                const communitySessions = getCommunitySessions();
                if (sessionData.id && sessions.some(s => s.id === sessionData.id)) {
                    // Update existing
                    const idx = sessions.findIndex(s => s.id === sessionData.id);
                    sessions[idx] = sessionData;
                } else {
                    communitySessions.unshift(sessionData);
                }
                saveCommunitySessions(communitySessions);
                return;
            }
            
            try {
                // Check if session already exists in cloud (update) or is new
                if (sessionData.id && typeof sessionData.id === 'string' && sessionData.id.includes('-')) {
                    // Update existing session
                    const { error } = await supabaseClient
                        .from('sessions')
                        .update({
                            date: sessionData.date,
                            players: sessionData.players,
                            total_up: sessionData.totalUp,
                            total_down: sessionData.totalDown,
                            net: sessionData.net
                        })
                        .eq('id', sessionData.id);
                    
                    if (error) throw error;
                    
                    // Update local
                    const idx = sessions.findIndex(s => s.id === sessionData.id);
                    if (idx >= 0) sessions[idx] = sessionData;
                    saveToLocalStorage();
                    return;
                }
                
                // Insert new session
                const { data, error } = await supabaseClient
                    .from('sessions')
                    .insert({
                        community_id: currentCommunity.id,
                        date: sessionData.date,
                        players: sessionData.players,
                        total_up: sessionData.totalUp,
                        total_down: sessionData.totalDown,
                        net: sessionData.net
                    })
                    .select()
                    .single();
                
                if (error) throw error;
                
                // Add to local sessions
                sessions.unshift(data);
                saveToLocalStorage();
                
            } catch (err) {
                console.error('Save session error:', err);
                // Fallback to local
                const communitySessions = getCommunitySessions();
                communitySessions.unshift(sessionData);
                saveCommunitySessions(communitySessions);
            }
        }
        
        async function deleteSessionFromCloud(sessionId) {
            if (!currentCommunity) {
                const communitySessions = getCommunitySessions().filter(s => s.id !== sessionId);
                saveCommunitySessions(communitySessions);
                return;
            }
            
            try {
                await supabaseClient
                    .from('sessions')
                    .delete()
                    .eq('id', sessionId);
                
                sessions = sessions.filter(s => s.id !== sessionId);
                saveToLocalStorage();
            } catch (err) {
                console.error('Delete error:', err);
            }
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
        }
        
        function logout() {
            currentUser = null;
            currentCommunity = null;
            localStorage.removeItem('pokerCommunity');
            localStorage.removeItem('pokerUser');
            sessions = JSON.parse(localStorage.getItem('pokerSessions') || '[]');
            renderLoginPage();
            renderCommunitySelector();
            renderPlayers();
            renderHistory();
            renderStats();
        }

        initSupabase();

        function getCommunitySessions() {
            return sessions;
        }
        
        function renderCommunitySelector() {
            const nameEl = document.getElementById('communityName');
            if (!nameEl) return;
            
            if (currentCommunity) {
                nameEl.textContent = '☁️ ' + currentCommunity.name;
            } else {
                nameEl.textContent = '☁️ Not connected';
            }
        }
        
        const buyInInput = document.getElementById('buyInAmount');
        const newPlayerInput = document.getElementById('newPlayerName');
        const playersList = document.getElementById('playersList');
        const confirmCheck = document.getElementById('confirmSave');
        const saveBtn = document.getElementById('saveBtn');
        
        confirmCheck.addEventListener('change', () => { saveBtn.disabled = !confirmCheck.checked || players.length === 0; });
        
        function addPlayer() {
            const name = newPlayerInput.value.trim();
            const buyIn = parseFloat(buyInInput.value) || 1000;
            if (!name) { alert('Please enter a player name'); return; }
            players.push({ name, hands: 1, buyIn, stack: buyIn });
            newPlayerInput.value = '';
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        function removePlayer(index) {
            players.splice(index, 1);
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        function changeHands(index, delta) {
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            players[index].hands += delta;
            if (players[index].hands < 1) players[index].hands = 1;
            players[index].buyIn = players[index].hands * baseBuyIn;
            players[index].stack = players[index].buyIn;
            renderPlayers();
        }
        
        function updateStack(index, value) {
            players[index].stack = parseFloat(value) || 0;
            renderPlayers();
        }
        
        function updateAllStacks() {
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            players.forEach(p => { p.buyIn = p.hands * baseBuyIn; p.stack = p.buyIn; });
            renderPlayers();
        }
        
        function updateName(index, value) { players[index].name = value; renderPlayers(); }
        
        function calculateTotals() {
            let totalUp = 0, totalDown = 0;
            players.forEach(p => { const pnl = p.stack - p.buyIn; if (pnl >= 0) totalUp += pnl; else totalDown += pnl; });
            return { totalUp, totalDown, net: totalUp + totalDown };
        }
        
        function renderPlayers() {
            const { totalUp, totalDown, net } = calculateTotals();
            if (players.length === 0) {
                playersList.innerHTML = '<div class="empty">No players yet.</div>';
            } else {
                let html = '';
                players.forEach((p, i) => {
                    const pnl = p.stack - p.buyIn;
                    const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                    const pnlPrefix = pnl >= 0 ? '+' : '';
                    html += `<div class="player-row"><div><input type="text" class="name-input" value="${p.name}" onchange="updateName(${i}, this.value)"></div><div class="hands-control"><button class="btn-hands" onclick="changeHands(${i}, -1)">−</button><span class="hands-num">${p.hands}</span><button class="btn-hands" onclick="changeHands(${i}, 1)">+</button></div><div><input type="number" class="stack-input" value="${p.stack}" onchange="updateStack(${i}, this.value)"></div><div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(pnl).toLocaleString()}</div><button class="btn-delete" onclick="removePlayer(${i})">🗑️</button></div>`;
                });
                playersList.innerHTML = html;
            }
            renderNetStatus(net);
        }
        
        function renderNetStatus(net) {
            const netDiv = document.getElementById('netStatus');
            if (players.length === 0) { netDiv.innerHTML = ''; return; }
            if (Math.abs(net) < 1) netDiv.innerHTML = '<div class="net-status even">✅ Table is EVEN</div>';
            else if (net > 0) netDiv.innerHTML = `<div class="net-status win">📈 Table WINNING by ${Math.round(net).toLocaleString()}</div>`;
            else netDiv.innerHTML = `<div class="net-status loss">📉 Table LOSING by ${Math.round(Math.abs(net)).toLocaleString()}</div>`;
        }
        
        function renderTotals(totalUp, totalDown) {
            let totalsDiv = document.getElementById('totals');
            if (!totalsDiv) { totalsDiv = document.createElement('div'); totalsDiv.id = 'totals'; totalsDiv.className = 'totals'; document.body.appendChild(totalsDiv); }
            totalsDiv.innerHTML = `<div class="total-item"><div class="label">Total Up</div><div class="value">${Math.round(totalUp).toLocaleString()}</div></div><div class="total-item"><div class="label">Total Down</div><div class="value">${Math.round(totalDown).toLocaleString()}</div></div><div class="total-item"><div class="label">Net</div><div class="value">${Math.round(totalUp + totalDown).toLocaleString()}</div></div>`;
        }
        
        function saveSession() {
            const { net } = calculateTotals();
            if (Math.abs(net) >= 1) { alert('Cannot save: Table imbalance!'); return; }
            
            const sessionData = { 
                id: Date.now(), 
                date: new Date().toISOString().split('T')[0], 
                players: JSON.parse(JSON.stringify(players)), 
                totalUp: calculateTotals().totalUp, 
                totalDown: calculateTotals().totalDown, 
                net: net,
                communityId: currentCommunity?.id || 'local'
            };
            
            // Save to cloud + local
            saveSessionToCloud(sessionData);
            
            players = []; confirmCheck.checked = false; saveBtn.disabled = true;
            renderPlayers(); renderHistory(); renderStats(); alert('Session saved!');
        }
        
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            // Show blank if not logged in
            if (!currentCommunity) { 
                historyList.innerHTML = '<div class="empty">Please login to view history</div>'; 
                return; 
            }
            
            const communitySessions = getCommunitySessions();
            console.log('Rendering history, sessions:', communitySessions.length);
            
            if (communitySessions.length === 0) { historyList.innerHTML = '<div class="empty">No sessions recorded yet.</div>'; return; }
            let html = '';
            communitySessions.forEach((session, idx) => {

                console.log('Session', idx, 'id:', session.id, 'type:', typeof session.id);

            });
            historyList.innerHTML = html;
        }
        
        function openEditModal(sessionId, viewOnly = false) {
            // Check if user is owner - only owners can edit
            if (!viewOnly && currentUser && currentUser.role && currentUser.role !== 'owner') {
                alert('Only the community manager can edit sessions');
                return;
            }
            
            editingSessionId = sessionId;
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            document.getElementById('editDate').value = session.date;
            renderEditPlayers(session.players);
            document.getElementById('sessionModal').classList.add('active');
        }
        
        function renderEditPlayers(players) {
            let html = '';
            let totalUp = 0, totalDown = 0;
            
            players.forEach((p, i) => {
                const pnl = p.stack - p.buyIn;
                if (pnl >= 0) totalUp += pnl;
                else totalDown += Math.abs(pnl);
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                const pnlPrefix = pnl >= 0 ? '+' : '';
                html += `<div class="player-edit-row"><input type="text" value="${p.name}" id="editName_${i}"><input type="number" value="${p.buyIn || 0}" id="editBuyIn_${i}"><input type="number" value="${p.stack}" id="editStack_${i}"><div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(pnl)}</div><button class="btn-delete" onclick="removeEditPlayer(${i})">🗑️</button></div>`;
            });
            
            // Add total net row
            const net = totalUp - totalDown;
            const netClass = Math.abs(net) < 1 ? 'even' : (net >= 0 ? 'positive' : 'negative');
            const netText = Math.abs(net) < 1 ? '✅ EVEN' : (net >= 0 ? `+${Math.round(net)}` : Math.round(net));
            html += `<div class="player-edit-row" style="border-top: 2px solid var(--gold); font-weight: bold;"><div>Total</div><div>${Math.round(totalUp + totalDown).toLocaleString()}</div><div></div><div class="${netClass}">${netText}</div><div></div></div>`;
            
            html += '<button class="btn-add" style="margin-top:10px;" onclick="addEditPlayer()">➕ Add Player</button>';
            document.getElementById('editPlayersList').innerHTML = html;
        }
        
        function removeEditPlayer(index) {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            session.players.splice(index, 1);
            renderEditPlayers(session.players);
        }
        
        function addEditPlayer() {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            session.players.push({ name: 'New Player', hands: 1, buyIn: baseBuyIn, stack: baseBuyIn });
            renderEditPlayers(session.players);
        }
        
        function saveSessionChanges() {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            
            // Check if table is balanced - update name, buyIn, and stack
            session.players.forEach((p, i) => { 
                p.name = document.getElementById('editName_' + i).value; 
                p.buyIn = parseFloat(document.getElementById('editBuyIn_' + i).value) || 0;
                p.stack = parseFloat(document.getElementById('editStack_' + i).value) || 0;
            });
            
            let totalUp = 0, totalDown = 0;
            session.players.forEach(p => { const pnl = p.stack - p.buyIn; if (pnl >= 0) totalUp += pnl; else totalDown += Math.abs(pnl); });
            const net = totalUp - totalDown;
            
            if (Math.abs(net) >= 1) {
                alert('Cannot save: Table must be balanced! Current net: ' + net);
                return;
            }
            
            session.date = document.getElementById('editDate').value;
            session.totalUp = totalUp; session.totalDown = -totalDown; session.net = net;
            
            // Save to cloud
            saveSessionToCloud(session);
            
            saveToLocalStorage();
            closeModal('sessionModal'); renderHistory(); renderStats(); alert('Changes saved!');
        }
        
        function deleteCurrentSession() {
            // Check if user is owner
            if (!currentUser || currentUser.role !== 'owner') {
                alert('Only the community manager can delete sessions');
                return;
            }
            
            if (!confirm('Are you sure you want to delete this session?')) return;
            const sessionId = editingSessionId;
            
            // Delete from cloud + local
            deleteSessionFromCloud(sessionId);
            
            sessions = sessions.filter(s => s.id !== sessionId);
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
            
            closeModal('sessionModal'); renderHistory(); renderStats();
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            if (modalId === 'sessionModal') editingSessionId = null;
        }
        
        function renderStats() {
            const statsDiv = document.getElementById('statsContent');

            // Show blank if not logged in
            if (!currentCommunity) {
                statsDiv.innerHTML = '<div class="empty">Please login to view stats</div>';
                return;
            }

            const communitySessions = getCommunitySessions();
            if (communitySessions.length === 0) { statsDiv.innerHTML = '<div class="empty">No data yet. Play some sessions!</div>'; return; }

            // ── Core player stats accumulation ──────────────────────────────────
            const playerStats = {};
            let totalSessions = communitySessions.length;
            let highestSessionWin = 0, highestSessionWinName = '';
            let highestSessionLoss = 0, highestSessionLossName = '';

            communitySessions.forEach(session => {
                const sessionPlayerCount = session.players.length;
                session.players.forEach(p => {
                    const pnl = p.stack - p.buyIn;
                    if (pnl > highestSessionWin) { highestSessionWin = pnl; highestSessionWinName = p.name; }
                    if (pnl < highestSessionLoss) { highestSessionLoss = pnl; highestSessionLossName = p.name; }
                    if (!playerStats[p.name]) playerStats[p.name] = {
                        buyIn: 0, final: 0, sessions: 0, net: 0,
                        wins: 0, losses: 0,
                        maxWinStreak: 0, maxLossStreak: 0,
                        currentStreak: 0, currentStreakType: '',
                        comebackCount: 0,
                        smallTablePnl: 0, smallTableSessions: 0,
                        largeTablePnl: 0, largeTableSessions: 0,
                        sessionPnls: []
                    };
                    const ps = playerStats[p.name];
                    ps.buyIn += p.buyIn;
                    ps.final += p.stack;
                    ps.sessions += 1;
                    ps.net += pnl;
                    ps.sessionPnls.push(pnl);
                    if (pnl > 0) ps.wins++;
                    else if (pnl < 0) ps.losses++;
                    // Comeback King: hands >= 3 but still won
                    if ((p.hands || 1) >= 3 && pnl > 0) ps.comebackCount++;
                    // Session size impact
                    if (sessionPlayerCount <= 6) { ps.smallTablePnl += pnl; ps.smallTableSessions++; }
                    else { ps.largeTablePnl += pnl; ps.largeTableSessions++; }
                });
            });

            // ── Streaks (chronological order) ──────────────────────────────────
            const sortedChron = [...communitySessions].sort((a, b) => new Date(a.date) - new Date(b.date));
            Object.keys(playerStats).forEach(playerName => {
                let curW = 0, maxW = 0, curL = 0, maxL = 0;
                let lastStreakType = '', lastStreakCount = 0;
                sortedChron.forEach(session => {
                    const player = session.players.find(p => p.name === playerName);
                    if (player) {
                        const pnl = player.stack - player.buyIn;
                        if (pnl > 0) {
                            curW++; if (curW > maxW) maxW = curW; curL = 0;
                            lastStreakType = 'W'; lastStreakCount = curW;
                        } else if (pnl < 0) {
                            curL++; if (curL > maxL) maxL = curL; curW = 0;
                            lastStreakType = 'L'; lastStreakCount = curL;
                        } else {
                            curW = 0; curL = 0; lastStreakType = ''; lastStreakCount = 0;
                        }
                    }
                });
                playerStats[playerName].maxWinStreak = maxW;
                playerStats[playerName].maxLossStreak = maxL;
                playerStats[playerName].currentStreakType = lastStreakType;
                playerStats[playerName].currentStreak = lastStreakCount;
            });

            // ── Overall streak leaders ──────────────────────────────────────────
            let longestWinStreak = { name: '', count: 0 };
            let longestLossStreak = { name: '', count: 0 };
            Object.entries(playerStats).forEach(([name, stats]) => {
                if (stats.maxWinStreak > longestWinStreak.count) longestWinStreak = { name, count: stats.maxWinStreak };
                if (stats.maxLossStreak > longestLossStreak.count) longestLossStreak = { name, count: stats.maxLossStreak };
            });

            // ── ROI & Avg P&L ───────────────────────────────────────────────────
            let bestROI = { name: '', roi: -Infinity };
            let bestAvgPnl = { name: '', avg: -Infinity };
            Object.entries(playerStats).forEach(([name, stats]) => {
                stats.roi = stats.buyIn > 0 ? (stats.net / stats.buyIn) * 100 : 0;
                stats.avgPnl = stats.sessions > 0 ? stats.net / stats.sessions : 0;
                if (stats.sessions >= 3) {
                    if (stats.roi > bestROI.roi) bestROI = { name, roi: stats.roi };
                    if (stats.avgPnl > bestAvgPnl.avg) bestAvgPnl = { name, avg: stats.avgPnl };
                }
            });

            // ── Shark Index (5+ sessions) ───────────────────────────────────────
            let topShark = { name: '', score: -Infinity };
            Object.entries(playerStats).forEach(([name, stats]) => {
                if (stats.sessions >= 5) {
                    const winRate = stats.wins / stats.sessions;
                    // Normalise ROI to 0-1 range (cap at ±200%)
                    const roiNorm = Math.max(0, Math.min(1, (stats.roi + 200) / 400));
                    // Consistency: low variance = high score; use std dev of session P&Ls
                    const mean = stats.avgPnl;
                    const variance = stats.sessionPnls.reduce((s, v) => s + (v - mean) ** 2, 0) / stats.sessionPnls.length;
                    const stdDev = Math.sqrt(variance);
                    // Normalise consistency: lower stdDev relative to |mean| is better
                    const cv = mean !== 0 ? Math.abs(stdDev / mean) : 10;
                    const consistencyScore = Math.max(0, 1 - Math.min(cv, 3) / 3);
                    stats.sharkIndex = Math.round((winRate * 40 + roiNorm * 30 + consistencyScore * 30) * 10) / 10;
                    if (stats.sharkIndex > topShark.score) topShark = { name, score: stats.sharkIndex };
                } else {
                    stats.sharkIndex = null;
                }
            });

            // ── Comeback King ───────────────────────────────────────────────────
            let comebackKing = { name: '', count: 0 };
            Object.entries(playerStats).forEach(([name, stats]) => {
                if (stats.comebackCount > comebackKing.count) comebackKing = { name, count: stats.comebackCount };
            });

            // ── Highest buy-in ──────────────────────────────────────────────────
            let highestBuyIn = 0;
            communitySessions.forEach(session => session.players.forEach(p => { if (p.buyIn > highestBuyIn) highestBuyIn = p.buyIn; }));

            // ── Win rate leader (5+ sessions) ───────────────────────────────────
            let highestWinRatePlayer = { name: '', rate: 0 };
            Object.entries(playerStats).forEach(([name, stats]) => {
                if (stats.sessions >= 5) {
                    const rate = Math.round((stats.wins / stats.sessions) * 100);
                    if (rate > highestWinRatePlayer.rate) highestWinRatePlayer = { name, rate };
                }
            });

            // ── Highest accumulative winner ─────────────────────────────────────
            let highestWinner = { name: '', net: -Infinity };
            Object.entries(playerStats).forEach(([name, stats]) => { if (stats.net > highestWinner.net) highestWinner = { name, net: stats.net }; });

            // ════════════════════════════════════════════════════════════════════
            // BUILD HTML
            // ════════════════════════════════════════════════════════════════════

            // ── Row 1: existing summary cards ───────────────────────────────────
            let html = `<div class="stats-summary">
                <div class="stat-card"><div class="label">Total Sessions</div><div class="value">${totalSessions}</div></div>
                <div class="stat-card"><div class="label">Total Players</div><div class="value">${Object.keys(playerStats).length}</div></div>
                <div class="stat-card"><div class="label">Highest Buy-in</div><div class="value">${highestBuyIn.toLocaleString()}</div></div>
                <div class="stat-card"><div class="label">🏆 Highest Win Rate</div><div class="value">${highestWinRatePlayer.name ? highestWinRatePlayer.name + ' (' + highestWinRatePlayer.rate + '%)' : '-'}</div></div>

        function filterPlayerTable() {

        // ── Monthly Bar Chart ────────────────────────────────────────────────────
        function renderMonthlyChart() {
            const container = document.getElementById('monthlyBarChart');
            if (!container) return;
            const selectedPlayer = document.getElementById('monthlyPlayerFilter')?.value || 'All Players';
            const communitySessions = getCommunitySessions();

            // Aggregate by month
            const monthlyData = {};
            communitySessions.forEach(session => {
                const month = session.date.slice(0, 7); // YYYY-MM
                if (!monthlyData[month]) monthlyData[month] = 0;
                if (selectedPlayer === 'All Players') {
                    session.players.forEach(p => { monthlyData[month] += (p.stack - p.buyIn); });
                } else {
                    const player = session.players.find(p => p.name === selectedPlayer);
                    if (player) monthlyData[month] += (player.stack - player.buyIn);
                }
            });

            const months = Object.keys(monthlyData).sort();
            if (months.length === 0) { container.innerHTML = '<div class="empty">No data</div>'; return; }

            const values = months.map(m => monthlyData[m]);
            const maxAbs = Math.max(...values.map(Math.abs), 1);
            const maxBarHeight = 120; // px

            let barsHtml = '<div class="monthly-bar-chart">';
            months.forEach((month, i) => {
                const val = values[i];
                const barH = Math.max(2, Math.round((Math.abs(val) / maxAbs) * maxBarHeight));
                const cls = val >= 0 ? 'positive' : 'negative';
                const valStr = val >= 0 ? '+' + Math.round(val / 1000) + 'k' : Math.round(val / 1000) + 'k';
                const label = month.slice(5); // MM
                const yearLabel = month.slice(2, 4); // YY
                barsHtml += `<div class="monthly-bar">
                    <div class="monthly-bar-value ${cls}">${valStr}</div>
                    <div class="monthly-bar-fill ${cls}" style="height:${barH}px;"></div>
                    <div class="monthly-bar-label">${label}/${yearLabel}</div>
                </div>`;
            });
            barsHtml += '</div>';
            container.innerHTML = barsHtml;
        }

        // ── Head-to-Head Calculator ──────────────────────────────────────────────
        function renderH2H() {
            const p1El = document.getElementById('h2hPlayer1');
            const p2El = document.getElementById('h2hPlayer2');
            const resultEl = document.getElementById('h2hResult');
            if (!p1El || !p2El || !resultEl) return;

            const p1 = p1El.value;
            const p2 = p2El.value;

            if (p1 === p2) {
                resultEl.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">Select two different players</div>';
                return;
            }

            const communitySessions = getCommunitySessions();
            let p1Wins = 0, p2Wins = 0, ties = 0, sharedSessions = 0;
            let p1TotalPnl = 0, p2TotalPnl = 0;

            communitySessions.forEach(session => {
                const player1 = session.players.find(p => p.name === p1);
                const player2 = session.players.find(p => p.name === p2);
                if (player1 && player2) {
                    sharedSessions++;
                    const pnl1 = player1.stack - player1.buyIn;
                    const pnl2 = player2.stack - player2.buyIn;
                    p1TotalPnl += pnl1;
                    p2TotalPnl += pnl2;
                    if (pnl1 > pnl2) p1Wins++;
                    else if (pnl2 > pnl1) p2Wins++;
                    else ties++;
                }
            });

            if (sharedSessions === 0) {
                resultEl.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">These players have never played in the same session</div>';
                return;
            }

            const p1WinClass = p1Wins > p2Wins ? 'winner' : 'loser';
            const p2WinClass = p2Wins > p1Wins ? 'winner' : 'loser';
            const p1PnlStr = (p1TotalPnl >= 0 ? '+' : '') + Math.round(p1TotalPnl).toLocaleString();
            const p2PnlStr = (p2TotalPnl >= 0 ? '+' : '') + Math.round(p2TotalPnl).toLocaleString();

            resultEl.innerHTML = `
                <div class="h2h-vs">
                    <div class="h2h-player">
                        <div class="h2h-name">${p1}</div>
                        <div class="h2h-wins ${p1WinClass}">${p1Wins}</div>
                        <div style="font-size:11px;color:var(--text-dim);">wins</div>
                        <div style="font-size:12px;margin-top:4px;color:${p1TotalPnl>=0?'var(--profit)':'var(--loss)'}">${p1PnlStr}</div>
                    </div>
                    <div class="h2h-divider">VS</div>
                    <div class="h2h-player">
                        <div class="h2h-name">${p2}</div>
                        <div class="h2h-wins ${p2WinClass}">${p2Wins}</div>
                        <div style="font-size:11px;color:var(--text-dim);">wins</div>
                        <div style="font-size:12px;margin-top:4px;color:${p2TotalPnl>=0?'var(--profit)':'var(--loss)'}">${p2PnlStr}</div>
                    </div>
                </div>
                <div class="h2h-meta">${sharedSessions} shared sessions${ties > 0 ? ' · ' + ties + ' tie(s)' : ''}</div>
            `;
        }
        
        function renderPnLChart() {
            const container = document.getElementById('pnlChart');
            if (!container) return;
            
            const selectedPlayer = document.getElementById('playerFilter')?.value || (playerNames.length > 0 ? playerNames[0] : null);
            
            // Build cumulative winnings data
            const communitySessions = getCommunitySessions();
            const sortedSessions = [...communitySessions].sort((a, b) => new Date(a.date) - new Date(b.date));
            let cumulative = 0;
            const chartData = [];
            
            sortedSessions.forEach(session => {
                let sessionPnl = 0;
                if (!selectedPlayer) {
                    session.players.forEach(p => { sessionPnl += (p.stack - p.buyIn); });
                } else {
                    const player = session.players.find(p => p.name === selectedPlayer);
                    if (player) sessionPnl = player.stack - player.buyIn;
                }
                cumulative += sessionPnl;
                chartData.push({ date: session.date, pnl: sessionPnl, cumulative });
            });
            
            if (chartData.length === 0) { container.innerHTML = '<div class="empty">No data</div>'; return; }
            
            // Better SVG chart with hover tooltips
            const width = container.clientWidth || 350;
            const height = 200;
            const padding = { top: 20, right: 20, bottom: 40, left: 60 };
            
            const minCum = Math.min(...chartData.map(d => d.cumulative), 0);
            const maxCum = Math.max(...chartData.map(d => d.cumulative), 0);
            // Add padding to range
            const range = (maxCum - minCum) || 1;
            const yMin = minCum - range * 0.1;
            const yMax = maxCum + range * 0.1;
            const yRange = yMax - yMin;
            
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            const getX = (i) => padding.left + (i / (chartData.length - 1 || 1)) * chartWidth;
            const getY = (val) => padding.top + chartHeight - ((val - yMin) / yRange) * chartHeight;
            
            let pathD = '';
            chartData.forEach((d, i) => {
                const x = getX(i);
                const y = getY(d.cumulative);
                pathD += (i === 0 ? 'M' : 'L') + x + ',' + y;
            });
            
            const isPositive = chartData[chartData.length - 1]?.cumulative >= 0;
            const lineColor = isPositive ? '#f6465d' : '#0b8a4e';
            const fillColor = isPositive ? 'rgba(246, 70, 93, 0.15)' : 'rgba(11, 138, 78, 0.15)';
            
            // Area fill
            let areaD = pathD + ` L${getX(chartData.length - 1)},${getY(0)} L${getX(0)},${getY(0)} Z`;
            
            // Grid lines
            let gridLines = '';
            const numGridLines = 5;
            for (let i = 0; i <= numGridLines; i++) {
                const y = padding.top + (i / numGridLines) * chartHeight;
                const val = yMax - (i / numGridLines) * yRange;
                gridLines += `<line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#2a2e39" stroke-dasharray="3"/>`;
                gridLines += `<text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" fill="#848e9c" font-size="10">${val >= 0 ? '+' : ''}${Math.round(val/1000)}k</text>`;
            }
            
            // X-axis labels
            let xLabels = '';
            // Show year-month on X-axis
            chartData.forEach((d, i) => {
                if (chartData.length <= 5 || i === 0 || i === chartData.length - 1 || i === Math.floor(chartData.length / 2)) {
                    xLabels += `<text x="${getX(i)}" y="${height - 10}" text-anchor="middle" fill="#848e9c" font-size="10">${d.date.slice(0, 7)}</text>`;
                }
            });
            
            // Hover dots with tooltips
            let hoverElements = '';
            chartData.forEach((d, i) => {
                const x = getX(i);
                const y = getY(d.cumulative);
                hoverElements += `<circle class="chart-dot" cx="${x}" cy="${y}" r="6" fill="${lineColor}" opacity="0" 
                    onmouseover="showTooltip(event, '${d.date}', ${d.cumulative})" 
                    onmouseout="hideTooltip()"/>`;
            });
            
            container.innerHTML = `
                <svg viewBox="0 0 ${width} ${height}" style="width:100%;height:100%;">
                    ${gridLines}
                    <line x1="${padding.left}" y1="${getY(0)}" x2="${width - padding.right}" y2="${getY(0)}" stroke="#4a5568" stroke-width="1"/>
                    <path d="${areaD}" fill="${fillColor}"/>
                    <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    ${chartData.map((d, i) => `<circle cx="${getX(i)}" cy="${getY(d.cumulative)}" r="4" fill="${lineColor}"/>`).join('')}
                    ${xLabels}
                </svg>
                <div id="chartTooltip" style="position:absolute;background:#1a1d29;border:1px solid #4a5568;border-radius:6px;padding:8px 12px;font-size:12px;color:#eaecef;pointer-events:none;display:none;z-index:100;">
                    <div id="tooltipDate" style="color:#848e9c;"></div>
                    <div id="tooltipValue" style="font-weight:bold;font-size:14px;"></div>
                </div>
            `;
        }
        
        function showTooltip(event, date, value) {
            const tooltip = document.getElementById('chartTooltip');
            const tooltipDate = document.getElementById('tooltipDate');
            const tooltipValue = document.getElementById('tooltipValue');
            
            tooltipDate.textContent = date;
            tooltipValue.textContent = (value >= 0 ? '+' : '') + value.toLocaleString();
            tooltipValue.style.color = value >= 0 ? '#f6465d' : '#0b8a4e';
            
            tooltip.style.display = 'block';
            tooltip.style.left = (event.offsetX + 10) + 'px';
            tooltip.style.top = (event.offsetY - 40) + 'px';
        }
        
        function hideTooltip() {
            const tooltip = document.getElementById('chartTooltip');
            if (tooltip) tooltip.style.display = 'none';
        }
        
        function showPlayerDetail(playerName) {
            document.getElementById('playerModalTitle').textContent = playerName;

            // Calculate stats for this player
            const playerSessions = [];
            let wins = 0, losses = 0;
            let totalBuyIn = 0;
            let smallPnl = 0, smallCount = 0, largePnl = 0, largeCount = 0;
            const communitySessions = getCommunitySessions();

            communitySessions.forEach(session => {
                const player = session.players.find(p => p.name === playerName);
                if (player) {
                    const pnl = player.stack - player.buyIn;
                    if (pnl > 0) wins++;
                    else if (pnl < 0) losses++;
                    totalBuyIn += player.buyIn;
                    // Session size impact
                    if (session.players.length <= 6) { smallPnl += pnl; smallCount++; }
                    else { largePnl += pnl; largeCount++; }
                    playerSessions.push({ date: session.date, pnl, buyIn: player.buyIn, final: player.stack, hands: player.hands || 1 });
                }
            });

            playerSessions.sort((a, b) => new Date(b.date) - new Date(a.date));

            const totalNet = playerSessions.reduce((sum, s) => sum + s.pnl, 0);
            const totalSessions = playerSessions.length;
            const winRate = totalSessions > 0 ? Math.round((wins / totalSessions) * 100) : 0;
            const avgBuyIn = totalSessions > 0 ? totalBuyIn / totalSessions : 0;
            const roi = totalBuyIn > 0 ? (totalNet / totalBuyIn) * 100 : 0;
            const avgPnl = totalSessions > 0 ? totalNet / totalSessions : 0;

            // Calculate streaks (chronological)
            const chronSessions = [...playerSessions].sort((a, b) => new Date(a.date) - new Date(b.date));
            let curStreak = 0, maxWinStreak = 0, maxLossStreak = 0, streakType = '', curStreakCount = 0, curStreakTypeLabel = '';
            chronSessions.forEach(s => {
                if (s.pnl > 0) {
                    if (streakType === 'win') curStreak++; else { curStreak = 1; streakType = 'win'; }
                    if (curStreak > maxWinStreak) maxWinStreak = curStreak;
                    curStreakCount = curStreak; curStreakTypeLabel = 'W';
                } else if (s.pnl < 0) {
                    if (streakType === 'loss') curStreak++; else { curStreak = 1; streakType = 'loss'; }
                    if (curStreak > maxLossStreak) maxLossStreak = curStreak;
                    curStreakCount = curStreak; curStreakTypeLabel = 'L';
                } else {
                    curStreak = 0; streakType = ''; curStreakCount = 0; curStreakTypeLabel = '';
                }
            });

            document.getElementById('playerTotalSessions').textContent = totalSessions;
            document.getElementById('playerTotalNet').textContent = (totalNet >= 0 ? '+' : '') + Math.round(totalNet).toLocaleString();
            document.getElementById('playerTotalNet').className = 'value ' + (totalNet >= 0 ? 'positive' : 'negative');

            // Current streak indicator
            let streakIndicator = '';
            if (curStreakTypeLabel === 'W') streakIndicator = `<span class="streak-hot">🔥 ${curStreakCount}W streak</span>`;
            else if (curStreakTypeLabel === 'L') streakIndicator = `<span class="streak-cold">🧊 ${curStreakCount}L streak</span>`;

            // Session size impact
            const smallAvg = smallCount > 0 ? Math.round(smallPnl / smallCount) : null;
            const largeAvg = largeCount > 0 ? Math.round(largePnl / largeCount) : null;
            const sizeImpactHtml = `
                <div style="margin:10px 0;padding:10px;background:var(--bg);border-radius:8px;">
                    <div style="font-size:12px;color:var(--gold);font-weight:bold;margin-bottom:8px;">📊 Session Size Impact</div>
