<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokerGuys - Texas Hold'em Session Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        :root {
            --bg: #0b0e11; --card: #1e2329; --border: #2a2e39;
            --gold: #f0b90b; --profit: #f6465d; --loss: #0b8a4e;
            --text: #eaecef; --text-dim: #848e9c;
        }
        
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 70px; }
        
        .header { text-align: center; padding: 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        .header h1 { font-size: 28px; color: var(--gold); margin-bottom: 5px; }
        .header p { color: var(--text-dim); font-size: 12px; }
        
        .input-section { padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        
        input[type="number"], input[type="text"] {
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 16px;
        }
        input:focus { outline: none; border-color: var(--gold); }
        
        .btn-add { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .table-header { display: grid; grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr; padding: 12px 15px; background: var(--card); font-size: 12px; font-weight: 600; color: var(--gold); }
        
        .player-row { display: grid; grid-template-columns: 3fr 3fr 2.5fr 2.5fr 0.5fr; padding: 10px 15px; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); }
        .player-row:nth-child(even) { background: rgba(30, 35, 41, 0.5); }
        
        .name-input { background: transparent !important; border: none !important; padding: 5px !important; font-size: 14px !important; color: var(--text) !important; width: 100%; }
        
        .hands-control { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-hands { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: #000; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .hands-num { font-weight: bold; min-width: 25px; text-align: center; }
        
        .stack-input { background: transparent !important; border: none !important; padding: 5px !important; text-align: right; font-size: 14px !important; color: var(--gold) !important; width: 100%; }
        
        .pnl { text-align: right; font-weight: bold; font-size: 14px; }
        .pnl.positive { color: var(--profit); }
        .pnl.negative { color: var(--loss); }
        
        .btn-delete { background: transparent; border: none; font-size: 18px; cursor: pointer; padding: 5px; }
        
        .net-status { padding: 15px; margin: 10px 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 16px; }
        .net-status.even { background: rgba(11, 138, 78, 0.2); color: var(--loss); border: 1px solid var(--loss); }
        .net-status.win { background: rgba(246, 70, 93, 0.2); color: var(--profit); border: 1px solid var(--profit); }
        .net-status.loss { background: rgba(11, 138, 78, 0.2); color: var(--loss); border: 1px solid var(--loss); }
        
        .totals { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; background: var(--card); border-top: 2px solid var(--gold); position: fixed; bottom: 0; left: 0; right: 0; }
        .total-item { text-align: center; }
        .total-item .label { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
        .total-item .value { font-size: 16px; font-weight: bold; }
        
        .save-section { padding: 15px; padding-bottom: 90px; }
        .btn-save { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-save:disabled { background: var(--border); color: var(--text-dim); }
        
        .confirm-check { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 10px; background: var(--card); border-radius: 8px; }
        .confirm-check input { width: 20px; height: 20px; }
        
        .nav { display: flex; background: var(--card); border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
        .nav-item { flex: 1; padding: 12px; text-align: center; color: var(--text-dim); font-size: 12px; cursor: pointer; border: none; background: transparent; }
        .nav-item.active { color: var(--gold); }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .history-item        /* History */
 { padding: 15px; background: var(--card); border-radius: 8px; margin: 10px 15px; cursor: pointer; }
        .history-header { display: flex; justify-content: space-between; align-items: center; }
        .history-date { font-weight: bold; color: var(--gold); }
        .history-location { color: var(--text-dim); font-size: 12px; }
        .history-winner { text-align: right; }
        .history-winner .label { font-size: 10px; color: var(--text-dim); }
        .history-winner .name { font-weight: bold; color: var(--profit); font-size: 14px; }
        
        /* Session Detail Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: var(--bg); max-width: 600px; margin: 20px auto; border-radius: 12px; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .modal-header h2 { color: var(--gold); font-size: 18px; }
        .modal-close { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--text-dim); }
        
        .modal-input { margin-bottom: 15px; }
        .modal-input label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
        
        .player-edit-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr; gap: 5px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .player-edit-row input { padding: 8px; font-size: 13px; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-save-changes { flex: 1; padding: 12px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-delete-session { flex: 1; padding: 12px; background: transparent; color: var(--profit); border: 1px solid var(--profit); border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Stats */
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card.full { grid-column: span 2; }
        .stat-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
        .stat-card .value { font-size: 20px; font-weight: bold; color: var(--gold); }
        .stat-card .value.positive { color: var(--profit); }
        .stat-card .value.negative { color: var(--loss); }
        
        .chart-container { padding: 15px; background: var(--card); margin: 10px 15px; border-radius: 8px; }
        .chart-title { color: var(--gold); margin-bottom: 10px; font-size: 14px; }
        
        .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 150px; padding-top: 20px; }
        .bar { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .bar-value { font-size: 10px; margin-bottom: 5px; color: var(--text-dim); }
        .bar-fill { width: 100%; border-radius: 4px 4px 0 0; }
        .bar-fill.positive { background: var(--profit); }
        .bar-fill.negative { background: var(--loss); }
        .bar-label { font-size: 10px; color: var(--text-dim); margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50px; }
        
        .player-stats { padding: 15px; }
        .player-stats h3 { color: var(--gold); margin-bottom: 10px; font-size: 16px; }
        
        .player-stat-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .player-stat-row.header { color: var(--gold); font-weight: 600; font-size: 11px; }
        
        .empty { text-align: center; padding: 40px; color: var(--text-dim); }
        
        @media (min-width: 768px) { .container { max-width: 600px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🃏 PokerGuys</h1>
            <p>Texas Hold'em Session Tracker</p>
        </div>
        
        <!-- Session Page -->
        <div id="page-session" class="page active">
            <div class="input-section">
                <div class="input-row">
                    <div class="input-group">
                        <label>Buy-in Amount</label>
                        <input type="number" id="buyInAmount" value="1000" step="100" onchange="updateAllStacks()">
                    </div>
                    <div class="input-group">
                        <label>New Player</label>
                        <input type="text" id="newPlayerName" placeholder="Nickname...">
                    </div>
                </div>
                <button class="btn-add" onclick="addPlayer()">➕ Add Player</button>
            </div>
            
            <div class="table-header">
                <div>Name</div>
                <div style="text-align:center">Hands</div>
                <div style="text-align:right">Stack</div>
                <div style="text-align:right">P&L</div>
                <div></div>
            </div>
            
            <div id="playersList"></div>
            <div id="netStatus"></div>
            
            <div class="save-section">
                <div class="confirm-check">
                    <input type="checkbox" id="confirmSave">
                    <label for="confirmSave">I confirm to save (will clear current inputs)</label>
                </div>
                <button class="btn-save" id="saveBtn" onclick="saveSession()" disabled>💾 Save Session</button>
            </div>
        </div>
        
        <!-- History Page -->
        <div id="page-history" class="page">
            <div id="historyList"></div>
        </div>
        
        <!-- Stats Page -->
        <div id="page-stats" class="page">
            <div id="statsContent"></div>
        </div>
    </div>
    
    <!-- Session Edit Modal -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Session</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            
            <div class="modal-input">
                <label>Date</label>
                <input type="date" id="editDate">
            </div>
            
            <div class="table-header" style="border-radius: 8px 8px 0 0;">
                <div>Name</div>
                <div style="text-align:center">Hands</div>
                <div style="text-align:right">Stack</div>
                <div style="text-align:right">P&L</div>
                <div></div>
            </div>
            <div id="editPlayersList" style="background: var(--card); border-radius: 0 0 8px 8px; margin-bottom: 15px;"></div>
            
            <div class="modal-actions">
                <button class="btn-save-changes" onclick="saveSessionChanges()">💾 Save Changes</button>
                <button class="btn-delete-session" onclick="deleteCurrentSession()">🗑️ Delete</button>
            </div>
        </div>
    </div>
    
    <nav class="nav">
        <button class="nav-item active" onclick="showPage('session')">🃏 Session</button>
        <button class="nav-item" onclick="showPage('history')">📜 History</button>
        <button class="nav-item" onclick="showPage('stats')">📊 Stats</button>
    </nav>
    
    <script>
        let players = [];
        let sessions = JSON.parse(localStorage.getItem('pokerSessions') || '[]');
        let editingSessionId = null;
        
        const buyInInput = document.getElementById('buyInAmount');
        const newPlayerInput = document.getElementById('newPlayerName');
        const playersList = document.getElementById('playersList');
        const confirmCheck = document.getElementById('confirmSave');
        const saveBtn = document.getElementById('saveBtn');
        
        confirmCheck.addEventListener('change', () => { saveBtn.disabled = !confirmCheck.checked || players.length === 0; });
        
        function addPlayer() {
            const name = newPlayerInput.value.trim();
            const buyIn = parseFloat(buyInInput.value) || 1000;
            if (!name) { alert('Please enter a player name'); return; }
            players.push({ name, hands: 1, buyIn, stack: buyIn });
            newPlayerInput.value = '';
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        function removePlayer(index) {
            players.splice(index, 1);
            renderPlayers();
            saveBtn.disabled = !confirmCheck.checked || players.length === 0;
        }
        
        function changeHands(index, delta) {
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            players[index].hands += delta;
            if (players[index].hands < 1) players[index].hands = 1;
            players[index].buyIn = players[index].hands * baseBuyIn;
            players[index].stack = players[index].buyIn;
            renderPlayers();
        }
        
        function updateStack(index, value) {
            players[index].stack = parseFloat(value) || 0;
            renderPlayers();
        }
        
        function updateAllStacks() {
            // Update all players' buy-in based on new buy-in amount
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            players.forEach(p => {
                p.buyIn = p.hands * baseBuyIn;
                p.stack = p.buyIn;
            });
            renderPlayers();
        }
        
        function updateName(index, value) { players[index].name = value; renderPlayers(); }
        
        function calculateTotals() {
            let totalUp = 0, totalDown = 0;
            players.forEach(p => {
                const pnl = p.stack - p.buyIn;
                if (pnl >= 0) totalUp += pnl;
                else totalDown += pnl;
            });
            return { totalUp, totalDown, net: totalUp + totalDown };
        }
        
        function renderPlayers() {
            const { totalUp, totalDown, net } = calculateTotals();
            
            if (players.length === 0) {
                playersList.innerHTML = '<div class="empty">No players yet.</div>';
            } else {
                let html = '';
                players.forEach((p, i) => {
                    const pnl = p.stack - p.buyIn;
                    const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                    const pnlPrefix = pnl >= 0 ? '+' : '';
                    html += `
                    <div class="player-row">
                        <div><input type="text" class="name-input" value="${p.name}" onchange="updateName(${i}, this.value)"></div>
                        <div class="hands-control">
                            <button class="btn-hands" onclick="changeHands(${i}, -1)">−</button>
                            <span class="hands-num">${p.hands}</span>
                            <button class="btn-hands" onclick="changeHands(${i}, 1)">+</button>
                        </div>
                        <div><input type="number" class="stack-input" value="${p.stack}" onchange="updateStack(${i}, this.value)"></div>
                        <div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(pnl).toLocaleString()}</div>
                        <button class="btn-delete" onclick="removePlayer(${i})">🗑️</button>
                    </div>`;
                });
                playersList.innerHTML = html;
            }
            
            renderNetStatus(net);
            renderTotals(totalUp, totalDown);
        }
        
        function renderNetStatus(net) {
            const netDiv = document.getElementById('netStatus');
            if (players.length === 0) { netDiv.innerHTML = ''; return; }
            
            if (Math.abs(net) < 1) {
                netDiv.innerHTML = `<div class="net-status even">✅ Table is EVEN</div>`;
            } else if (net > 0) {
                netDiv.innerHTML = `<div class="net-status win">📈 Table WINNING by ${Math.round(net).toLocaleString()}</div>`;
            } else {
                netDiv.innerHTML = `<div class="net-status loss">📉 Table LOSING by ${Math.round(Math.abs(net)).toLocaleString()}</div>`;
            }
        }
        
        function renderTotals(totalUp, totalDown) {
            let totalsDiv = document.getElementById('totals');
            if (!totalsDiv) {
                totalsDiv = document.createElement('div');
                totalsDiv.id = 'totals';
                totalsDiv.className = 'totals';
                document.body.appendChild(totalsDiv);
            }
            totalsDiv.innerHTML = `
                <div class="total-item"><div class="label">Total Up</div><div class="value">${Math.round(totalUp).toLocaleString()}</div></div>
                <div class="total-item"><div class="label">Total Down</div><div class="value">${Math.round(totalDown).toLocaleString()}</div></div>
                <div class="total-item"><div class="label">Net</div><div class="value">${Math.round(totalUp + totalDown).toLocaleString()}</div></div>
            `;
        }
        
        function saveSession() {
            const { net } = calculateTotals();
            if (Math.abs(net) >= 1) { alert(`Cannot save: Table imbalance of ${Math.round(net)} chips!`); return; }
            
            const session = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                players: JSON.parse(JSON.stringify(players)),
                totalUp: calculateTotals().totalUp,
                totalDown: calculateTotals().totalDown,
                net
            };
            
            sessions.unshift(session);
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
            
            players = [];
            confirmCheck.checked = false;
            saveBtn.disabled = true;
            
            renderPlayers();
            renderHistory();
            alert('Session saved!');
        }
        
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            if (sessions.length === 0) { historyList.innerHTML = '<div class="empty">No sessions recorded yet.</div>'; return; }
            
            let html = '';
            sessions.forEach(session => {
                // Find biggest winner
                let biggestWinner = { name: '', pnl: -Infinity };
                session.players.forEach(p => {
                    const pnl = p.stack - p.buyIn;
                    if (pnl > biggestWinner.pnl) { biggestWinner = { name: p.name, pnl }; }
                });
                
                html += `
                <div class="history-item" onclick="openEditModal(${session.id})">
                    <div class="history-header">
                        <div>
                            <div class="history-date">${session.date}</div>
                            <div class="history-location">${session.players.length} players</div>
                        </div>
                        <div class="history-winner">
                            <div class="label">Biggest Winner</div>
                            <div class="name">${biggestWinner.name || '-'}</div>
                        </div>
                    </div>
                </div>`;
            });
            historyList.innerHTML = html;
        }
        
        function openEditModal(sessionId) {
            editingSessionId = sessionId;
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            
            document.getElementById('editDate').value = session.date;
            renderEditPlayers(session.players);
            document.getElementById('sessionModal').classList.add('active');
        }
        
        function renderEditPlayers(players) {
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            let html = '';
            players.forEach((p, i) => {
                const pnl = p.stack - p.buyIn;
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                const pnlPrefix = pnl >= 0 ? '+' : '';
                html += `
                <div class="player-edit-row">
                    <input type="text" value="${p.name}" id="editName_${i}">
                    <div style="text-align:center">${p.hands}</div>
                    <input type="number" value="${p.stack}" id="editStack_${i}">
                    <div class="pnl ${pnlClass}">${pnlPrefix}${Math.round(pnl)}</div>
                    <button class="btn-delete" onclick="removeEditPlayer(${i})">🗑️</button>
                </div>`;
            });
            html += `<button class="btn-add" style="margin-top:10px;" onclick="addEditPlayer()">➕ Add Player</button>`;
            document.getElementById('editPlayersList').innerHTML = html;
        }
        
        function removeEditPlayer(index) {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            session.players.splice(index, 1);
            renderEditPlayers(session.players);
        }
        
        function addEditPlayer() {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            session.players.push({ name: 'New Player', hands: 1, buyIn: baseBuyIn, stack: baseBuyIn });
            renderEditPlayers(session.players);
        }
        
        function saveSessionChanges() {
            const session = sessions.find(s => s.id === editingSessionId);
            if (!session) return;
            
            // Update date
            session.date = document.getElementById('editDate').value;
            
            // Update players
            const baseBuyIn = parseFloat(buyInInput.value) || 1000;
            session.players.forEach((p, i) => {
                p.name = document.getElementById(`editName_${i}`).value;
                p.stack = parseFloat(document.getElementById(`editStack_${i}`).value) || 0;
                p.buyIn = p.hands * baseBuyIn;
            });
            
            // Recalculate totals
            let totalUp = 0, totalDown = 0;
            session.players.forEach(p => {
                const pnl = p.stack - p.buyIn;
                if (pnl >= 0) totalUp += pnl;
                else totalDown += pnl;
            });
            session.totalUp = totalUp;
            session.totalDown = totalDown;
            session.net = totalUp + totalDown;
            
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
            closeModal();
            renderHistory();
            renderStats();
            alert('Changes saved!');
        }
        
        function deleteCurrentSession() {
            if (!confirm('Are you sure you want to delete this session?')) return;
            sessions = sessions.filter(s => s.id !== editingSessionId);
            localStorage.setItem('pokerSessions', JSON.stringify(sessions));
            closeModal();
            renderHistory();
            renderStats();
        }
        
        function closeModal() {
            document.getElementById('sessionModal').classList.remove('active');
            editingSessionId = null;
        }
        
        function renderStats() {
            const statsDiv = document.getElementById('statsContent');
            if (sessions.length === 0) { statsDiv.innerHTML = '<div class="empty">No data yet. Play some sessions!</div>'; return; }
            
            const playerStats = {};
            let totalSessions = sessions.length, totalBuyIn = 0, totalFinal = 0, totalNet = 0;
            
            sessions.forEach(session => {
                session.players.forEach(p => {
                    if (!playerStats[p.name]) playerStats[p.name] = { buyIn: 0, final: 0, sessions: 0, net: 0 };
                    playerStats[p.name].buyIn += p.buyIn;
                    playerStats[p.name].final += p.stack;
                    playerStats[p.name].sessions += 1;
                    playerStats[p.name].net += (p.stack - p.buyIn);
                    totalBuyIn += p.buyIn;
                    totalFinal += p.stack;
                    totalNet += (p.stack - p.buyIn);
                });
            });
            
            let html = `
                <div class="stats-summary">
                    <div class="stat-card"><div class="label">Total Sessions</div><div class="value">${totalSessions}</div></div>
                    <div class="stat-card"><div class="label">Total Players</div><div class="value">${Object.keys(playerStats).length}</div></div>
                    <div class="stat-card"><div class="label">Total Buy-in</div><div class="value">${Math.round(totalBuyIn).toLocaleString()}</div></div>
                    <div class="stat-card"><div class="label">Total Final</div><div class="value">${Math.round(totalFinal).toLocaleString()}</div></div>
                    <div class="stat-card full"><div class="label">Net P&L (All Time)</div><div class="value ${totalNet >= 0 ? 'positive' : 'negative'}">${totalNet >= 0 ? '+' : ''}${Math.round(totalNet).toLocaleString()}</div></div>
                </div>
                <div class="chart-container"><div class="chart-title">📊 P&L by Player</div><div class="bar-chart">`;
            
            const sortedPlayers = Object.entries(playerStats).sort((a, b) => b[1].net - a[1].net);
            const maxNet = Math.max(...sortedPlayers.map(p => Math.abs(p[1].net)), 1);
            
            sortedPlayers.forEach(([name, stats]) => {
                const height = (Math.abs(stats.net) / maxNet) * 100;
                html += `<div class="bar"><div class="bar-value">${stats.net >= 0 ? '+' : ''}${Math.round(stats.net)}</div><div class="bar-fill ${stats.net >= 0 ? 'positive' : 'negative'}" style="height: ${height}%;"></div><div class="bar-label">${name}</div></div>`;
            });
            
            html += `</div></div><div class="player-stats"><h3>🏆 Player Performance</h3><div class="player-stat-row header"><div>Player</div><div>Sessions</div><div>Buy-in</div><div>Final</div><div>Net</div></div>`;
            
            sortedPlayers.forEach(([name, stats]) => {
                const pnlClass = stats.net >= 0 ? 'pnl-positive' : 'pnl-negative';
                html += `<div class="player-stat-row"><div>${name}</div><div>${stats.sessions}</div><div>${Math.round(stats.buyIn).toLocaleString()}</div><div>${Math.round(stats.final).toLocaleString()}</div><div class="${pnlClass}">${stats.net >= 0 ? '+' : ''}${Math.round(stats.net).toLocaleString()}</div></div>`;
            });
            
            html += '</div>';
            statsDiv.innerHTML = html;
        }
        
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageName).classList.add('active');
            event.target.classList.add('active');
            if (pageName === 'history') renderHistory();
            if (pageName === 'stats') renderStats();
        }
        
        renderPlayers();
        renderHistory();
        
        newPlayerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });
    </script>
</body>
</html>
